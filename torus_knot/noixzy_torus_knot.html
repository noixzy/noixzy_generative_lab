<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>noixzy // torus knot</title>
<link rel="icon" href="data:,">
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<style>
  :root { --bg:#0e0e10; --panel:#101316; --ink:#e8e8ea; --accent:#f0c890; --dim:#8b969c; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--ink); font:13px/1.4 ui-monospace,SFMono-Regular,Menlo,monospace; }
  .app { display:flex; flex-direction:row; align-items:stretch; height:calc(100vh - 28px); }
  .stage { position:relative; flex:1 1 auto; min-width:0; background:#000; }
  .stage canvas { display:block; width:100%; height:100%; }
  .panel { position:relative; width:300px; box-sizing:border-box; margin:14px; max-height:calc(100vh - 56px); overflow-y:auto;
           background:rgba(12,15,18,0.72); -webkit-backdrop-filter:blur(13px); backdrop-filter:blur(13px);
           border:1px solid rgba(240,200,144,0.20); padding:14px; border-radius:9px; box-shadow:0 10px 34px rgba(0,0,0,0.45); }
  .panel.hidden { opacity:0; pointer-events:none; }
  .panel h1 { font-size:13px; letter-spacing:.12em; text-transform:lowercase; margin:0 0 12px; color:var(--accent); }
  .row { margin:10px 0; padding:3px 0 5px 8px; border-left:2px solid transparent; }
  .row label { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:5px; opacity:.9; }
  input[type=range] { width:100%; height:28px; accent-color:var(--accent); }
  button { min-height:34px; background:#000; color:var(--ink); border:1px solid #333; padding:6px 10px; font:inherit; cursor:pointer; border-radius:4px; }
  button:hover { border-color:var(--accent); color:var(--accent); }
  .tools { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:12px 0; }
  .presetBox { margin-top:10px; padding-top:10px; border-top:1px solid rgba(240,200,144,0.18); }
  .presetLine { display:grid; grid-template-columns:1fr auto; gap:8px; margin-top:8px; }
  select { width:100%; margin-top:2px; min-height:34px; background:#000; color:var(--ink); border:1px solid #333; padding:5px 8px; font:inherit; border-radius:4px; }
  select:hover { border-color:var(--accent); }
  .hint { margin-top:8px; opacity:.4; font-size:11px; }
  .navBar { flex:0 0 28px; display:flex; align-items:center; justify-content:space-between; padding:0 12px; background:#0a0a0c; border-bottom:1px solid #1c1c1f; z-index:10; }
  .navBar a { color:var(--dim); text-decoration:none; font-size:11px; letter-spacing:.07em; padding:4px 6px; border-radius:3px; }
  .navBar a:hover { color:var(--accent); }
  .navCurrent { color:var(--accent) !important; }
  .moduleNav { margin-top:12px; padding-top:10px; border-top:1px solid #1e1e21; }
  .moduleNav .label { font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--dim); margin-bottom:6px; }
  .thumbRow { display:flex; gap:5px; overflow-x:auto; padding-bottom:4px; scrollbar-width:none; }
  .thumbRow::-webkit-scrollbar { display:none; }
  .navThumb { flex:0 0 auto; opacity:.55; transition:opacity .15s; }
  .navThumb:hover,.navThumb.active { opacity:1; }
  .navThumb img { width:46px; height:34px; object-fit:cover; border-radius:3px; border:1px solid #2a2a2d; display:block; }
  .navThumb.active img { border-color:var(--accent); }
</style>
</head>
<body>
<div class="navBar">
  <a id="navPrev" href="#">← prev</a>
  <a href="../gallery/index.html" class="navCurrent">⊞ gallery</a>
  <a id="navNext" href="#">next →</a>
</div>
<div class="app">
  <div id="stage" class="stage"></div>
  <div class="panel" id="panel">
    <h1>noixzy // torus knot</h1>

    <div class="row" style="margin-bottom:10px">
      <label>theme</label>
      <select id="themeSelect" style="margin-top:2px"></select>
    </div>

    <div class="row"><label>p (winds) <span id="vP">—</span></label>
      <input id="sP" type="range" min="2" max="9" step="1" value="2"></div>
    <div class="row"><label>q (loops) <span id="vQ">—</span></label>
      <input id="sQ" type="range" min="3" max="11" step="1" value="3"></div>
    <div class="row"><label>tube radius <span id="vTube">—</span></label>
      <input id="sTube" type="range" min="0" max="1" step="0.01" value="0.28"></div>
    <div class="row"><label>knot scale <span id="vScale">—</span></label>
      <input id="sScale" type="range" min="0" max="1" step="0.01" value="0.55"></div>
    <div class="row"><label>spin <span id="vSpin">—</span></label>
      <input id="sSpin" type="range" min="0" max="1" step="0.01" value="0.22"></div>
    <div class="row"><label>distance <span id="vDist">—</span></label>
      <input id="sDist" type="range" min="2" max="9" step="0.05" value="5.5"></div>
    <div class="row"><label>elevation <span id="vElev">—</span></label>
      <input id="sElev" type="range" min="-2" max="2" step="0.05" value="0.8"></div>
    <div class="row"><label>ao <span id="vAO">—</span></label>
      <input id="sAO" type="range" min="0" max="1" step="0.01" value="0.6"></div>

    <div class="tools">
      <button id="btnSave" type="button">save png</button>
      <button id="btnPause" type="button">pause</button>
    </div>

    <div class="presetBox">
      <div class="presetLine">
        <select id="starterPreset"></select>
        <button id="btnLoad" type="button">load</button>
      </div>
    </div>

    <div class="moduleNav">
      <div class="label">modules</div>
      <div class="thumbRow" id="moduleThumbStrip"></div>
    </div>
    <div class="hint">h hide · space pause · [ ] theme · drag orbit · scroll zoom · s save</div>
  </div>
</div>

<script id="vert" type="x-shader/x-vertex">
attribute vec3 aPosition;
varying vec2 vUv;
void main(){
  vUv = aPosition.xy;
  gl_Position = vec4(aPosition.xy, 0.0, 1.0);
}
</script>

<script id="frag" type="x-shader/x-fragment">
precision highp float;
varying vec2 vUv;

uniform vec2  u_res;
uniform float u_time;
uniform float u_p;
uniform float u_q;
uniform float u_tube;
uniform float u_scale;
uniform float u_spin;
uniform float u_azimuth;
uniform float u_dist;
uniform float u_elev;
uniform float u_ao;
uniform vec3  u_bgColor;
uniform vec3  u_formColor;
uniform vec3  u_hiColor;
uniform float u_bgValue;
uniform float u_formSat;
uniform float u_formValue;
uniform float u_rim;

// torus knot SDF via closest point on curve
vec3 torusKnotPoint(float t){
  float p=u_p, q=u_q;
  float sc=mix(0.5, 2.2, u_scale);
  float r1=sc, r2=sc*0.38;
  float x=(r1+r2*cos(q*t))*cos(p*t);
  float y=(r1+r2*cos(q*t))*sin(p*t);
  float z=r2*sin(q*t);
  return vec3(x,y,z);
}

float sdTorusKnot(vec3 pos){
  float minD=1e8;
  for(int i=0;i<64;i++){
    float t=float(i)/63.0*6.28318530;
    vec3 kp=torusKnotPoint(t);
    float d=length(pos-kp);
    if(d<minD)minD=d;
  }
  return minD-mix(0.04,0.35,u_tube);
}

vec3 calcNormal(vec3 p){
  vec2 k=vec2(0.004,-0.004);
  return normalize(
    k.xyy*sdTorusKnot(p+k.xyy)+
    k.yyx*sdTorusKnot(p+k.yyx)+
    k.yxy*sdTorusKnot(p+k.yxy)+
    k.xxx*sdTorusKnot(p+k.xxx));
}

float calcAO(vec3 pos,vec3 nor){
  float occ=0.0,d;
  d=sdTorusKnot(pos+nor*0.07);occ+=(0.07-d)*1.0;
  d=sdTorusKnot(pos+nor*0.22);occ+=(0.22-d)*0.55;
  return clamp(1.0-1.8*occ,0.0,1.0);
}

vec3 toHSV(vec3 c){
  vec4 K=vec4(0.0,-1.0/3.0,2.0/3.0,-1.0);
  vec4 p=mix(vec4(c.bg,K.wz),vec4(c.gb,K.xy),step(c.b,c.g));
  vec4 q=mix(vec4(p.xyw,c.r),vec4(c.r,p.yzx),step(p.x,c.r));
  float d=q.x-min(q.w,q.y),e=1e-10;
  return vec3(abs(q.z+(q.w-q.y)/(6.0*d+e)),d/(q.x+e),q.x);
}
vec3 fromHSV(vec3 c){
  vec3 p=abs(fract(c.xxx+vec3(1.0,2.0/3.0,1.0/3.0))*6.0-vec3(3.0));
  return c.z*mix(vec3(1.0),clamp(p-vec3(1.0),0.0,1.0),c.y);
}

void main(){
  vec2 uv=vUv;
  uv.x*=u_res.x/u_res.y;

  float a=u_azimuth+u_time*u_spin*0.32;
  vec3 ro=vec3(sin(a)*u_dist,u_elev+0.18*sin(u_time*0.11),cos(a)*u_dist);
  vec3 ta=vec3(0.0);
  vec3 fw=normalize(ta-ro);
  vec3 rt=normalize(cross(vec3(0.0,1.0,0.0),fw));
  vec3 up=cross(fw,rt);
  vec3 rd=normalize(fw*1.85+rt*uv.x+up*uv.y);

  float tt=0.6;
  bool hit=false;
  for(int i=0;i<60;i++){
    float d=sdTorusKnot(ro+rd*tt);
    if(d<0.0015){hit=true;break;}
    if(tt>14.0)break;
    tt+=max(d*0.65,0.012);
  }

  float y=vUv.y*0.5+0.5;
  vec3 bgBase=max(u_bgColor*u_bgValue,vec3(0.0));
  vec3 bg=mix(bgBase*0.6,bgBase*1.1,y);
  float bvig=smoothstep(1.45,0.0,length(vUv*0.88));
  bg=mix(bg*0.75,bg,bvig);
  vec3 col=bg;

  if(hit){
    vec3 p=ro+rd*tt;
    vec3 n=calcNormal(p);
    float ao=mix(1.0,calcAO(p,n),u_ao);

    vec3 ld=normalize(vec3(0.6,0.85,0.5));
    float dif=clamp(dot(n,ld)*0.5+0.5,0.0,1.0);
    float rim=pow(clamp(1.0-dot(n,-rd),0.0,1.0),2.8);

    vec3 fHSV=toHSV(u_formColor);
    fHSV.y=clamp(fHSV.y*u_formSat,0.0,1.0);
    fHSV.z=clamp(fHSV.z*u_formValue,0.0,1.0);
    vec3 fc=fromHSV(fHSV);
    vec3 hc=u_hiColor;

    col=fc*dif*ao+hc*rim*u_rim*ao;
    col=mix(col,bg,clamp(1.0-ao*1.2,0.0,0.5));
  }

  gl_FragColor=vec4(col,1.0);
}
</script>

<script>
const PIECE="torus_knot";
const THEMEKEY="noixzy_lab_theme";
const PALETTES=[
  ["ember",    "#0e0e10","#5a2400","#ed8a3a"],
  ["mineral",  "#071414","#0f403a","#7fe0c2"],
  ["violet",   "#100c18","#2c2660","#b7b0ff"],
  ["amber",    "#140d06","#5a3414","#f0c890"],
  ["graphite", "#0c0c0c","#3a3a3a","#f2f2f2"],
  ["cyan",     "#071018","#103f5a","#72d8ff"],
  ["acid",     "#0a1207","#2d4f13","#c7ff4a"],
  ["magenta",  "#16070e","#5a1232","#ff6aa6"],
  ["gold",     "#15100a","#6b4514","#ffe0a0"],
  ["neutral",  "#0f1115","#222b34","#b7c1ca"],
  ["copper",   "#140b0b","#612626","#ff9a7a"],
  ["ice",      "#090d18","#17305f","#9bc8ff"],
];
const THEME_NAMES=PALETTES.map(p=>p[0]);

const STARTERS=[
  {name:"trefoil 2:3",  pal:3, P:{p:2,q:3,tube:0.28,scale:0.55,spin:0.22,dist:5.5,elev:0.8, ao:0.6}},
  {name:"cinquefoil",   pal:0, P:{p:2,q:5,tube:0.22,scale:0.48,spin:0.18,dist:5.0,elev:0.7, ao:0.65}},
  {name:"torus 3:4",    pal:5, P:{p:3,q:4,tube:0.32,scale:0.6, spin:0.28,dist:6.0,elev:1.0, ao:0.55}},
  {name:"star 3:5",     pal:2, P:{p:3,q:5,tube:0.2, scale:0.5, spin:0.15,dist:5.8,elev:0.9, ao:0.62}},
  {name:"thick 2:3",    pal:8, P:{p:2,q:3,tube:0.55,scale:0.52,spin:0.25,dist:5.2,elev:0.85,ao:0.58}},
  {name:"graphite",     pal:4, P:{p:2,q:3,tube:0.3, scale:0.55,spin:0.2, dist:5.5,elev:0.8, ao:0.6}},
];

let cs={bg:"#140d06",form:"#6b4514",hi:"#ffe0a0",bgVal:1,fSat:1,fVal:1,rim:1};
let P={p:2,q:3,tube:0.28,scale:0.55,spin:0.22,dist:5.5,elev:0.8,ao:0.6};
let t0,paused=false,pauseT=0,theShader;
let _camAzimuth=0,_drag={active:false,x:0,y:0};
let activeTheme=null;

function hexToRGB(h){return[parseInt(h.slice(1,3),16)/255,parseInt(h.slice(3,5),16)/255,parseInt(h.slice(5,7),16)/255];}
function clampV(v,a,b){return Math.min(b,Math.max(a,v));}

function _initOrbit(stg){
  stg.addEventListener("pointerdown",e=>{_drag={active:true,x:e.clientX,y:e.clientY};stg.setPointerCapture(e.pointerId);},{passive:true});
  stg.addEventListener("pointermove",e=>{if(!_drag.active)return;_camAzimuth+=(e.clientX-_drag.x)*0.012;P.elev=clampV(P.elev-(e.clientY-_drag.y)*0.007,-2,2);_drag.x=e.clientX;_drag.y=e.clientY;const se=document.getElementById("sElev");if(se){se.value=P.elev;document.getElementById("vElev").textContent=P.elev.toFixed(2);}},{passive:true});
  stg.addEventListener("pointerup",()=>{_drag.active=false;});
  stg.addEventListener("wheel",e=>{e.preventDefault();P.dist=clampV(P.dist+e.deltaY*0.006,2,9);const sd=document.getElementById("sDist");if(sd){sd.value=P.dist;document.getElementById("vDist").textContent=P.dist.toFixed(2);}},{passive:false});
}

function applyTheme(name){
  const idx=THEME_NAMES.indexOf(name);if(idx<0)return;
  activeTheme=name;
  cs.bg=PALETTES[idx][1];cs.form=PALETTES[idx][2];cs.hi=PALETTES[idx][3];
  const sel=document.getElementById("themeSelect");if(sel)sel.value=name;
  try{localStorage.setItem(THEMEKEY,name);}catch(e){}
}
function cycleTheme(dir){
  const idx=THEME_NAMES.indexOf(activeTheme);
  applyTheme(THEME_NAMES[((idx<0?0:idx)+dir+THEME_NAMES.length)%THEME_NAMES.length]);
}
function loadStarter(s){
  Object.assign(P,s.P);applyTheme(PALETTES[s.pal][0]);syncUI();
}
const PARAMS=[
  {id:"sP",    vid:"vP",    key:"p",    fmt:v=>Math.round(v).toString()},
  {id:"sQ",    vid:"vQ",    key:"q",    fmt:v=>Math.round(v).toString()},
  {id:"sTube", vid:"vTube", key:"tube", fmt:v=>v.toFixed(2)},
  {id:"sScale",vid:"vScale",key:"scale",fmt:v=>v.toFixed(2)},
  {id:"sSpin", vid:"vSpin", key:"spin", fmt:v=>v.toFixed(2)},
  {id:"sDist", vid:"vDist", key:"dist", fmt:v=>v.toFixed(2)},
  {id:"sElev", vid:"vElev", key:"elev", fmt:v=>v.toFixed(2)},
  {id:"sAO",   vid:"vAO",   key:"ao",   fmt:v=>v.toFixed(2)},
];
function syncUI(){PARAMS.forEach(c=>{document.getElementById(c.id).value=P[c.key];document.getElementById(c.vid).textContent=c.fmt(P[c.key]);});}

function setup(){
  const stage=document.getElementById("stage");
  const c=createCanvas(stage.clientWidth,stage.clientHeight,WEBGL);
  c.parent(stage); pixelDensity(1);

  theShader=createShader(
    document.getElementById("vert").textContent,
    document.getElementById("frag").textContent
  );
  t0=millis();

  const tSel=document.getElementById("themeSelect");
  THEME_NAMES.forEach(n=>{const o=document.createElement("option");o.value=n;o.textContent=n;tSel.appendChild(o);});
  tSel.addEventListener("change",e=>applyTheme(e.target.value));

  PARAMS.forEach(cfg=>{
    const el=document.getElementById(cfg.id);
    el.addEventListener("input",()=>{P[cfg.key]=parseFloat(el.value);document.getElementById(cfg.vid).textContent=cfg.fmt(P[cfg.key]);});
  });

  const starterSel=document.getElementById("starterPreset");
  STARTERS.forEach((s,i)=>{const o=document.createElement("option");o.value=i;o.textContent=s.name;starterSel.appendChild(o);});
  document.getElementById("btnLoad").addEventListener("click",()=>loadStarter(STARTERS[parseInt(starterSel.value)]));
  document.getElementById("btnSave").addEventListener("click",()=>saveCanvas(`noixzy_${PIECE}_${Math.floor(millis())}`,"png"));
  document.getElementById("btnPause").addEventListener("click",()=>{
    paused=!paused;if(paused)pauseT=millis()-t0;else t0=millis()-pauseT;
    document.getElementById("btnPause").textContent=paused?"play":"pause";
  });
  document.addEventListener("keydown",e=>{
    if(e.key==="h")document.getElementById("panel").classList.toggle("hidden");
    if(e.key===" "){e.preventDefault();document.getElementById("btnPause").click();}
    if(e.key==="[")cycleTheme(-1);if(e.key==="]")cycleTheme(1);
    if(e.key==="s")document.getElementById("btnSave").click();
  });

  const saved=localStorage.getItem(THEMEKEY);
  if(saved&&THEME_NAMES.includes(saved))applyTheme(saved);else applyTheme("amber");
  syncUI();
  _initOrbit(stage);
  buildNav();
  window.addEventListener("resize",()=>resizeCanvas(stage.clientWidth,stage.clientHeight));
}

function draw(){
  if(paused)return;
  const t=(millis()-t0)/1000;
  shader(theShader);
  theShader.setUniform("u_res",[width,height]);
  theShader.setUniform("u_time",t);
  theShader.setUniform("u_azimuth",_camAzimuth);
  theShader.setUniform("u_p",Math.round(P.p));
  theShader.setUniform("u_q",Math.round(P.q));
  theShader.setUniform("u_tube",P.tube);
  theShader.setUniform("u_scale",P.scale);
  theShader.setUniform("u_spin",P.spin);
  theShader.setUniform("u_dist",P.dist);
  theShader.setUniform("u_elev",P.elev);
  theShader.setUniform("u_ao",P.ao);
  theShader.setUniform("u_bgColor",hexToRGB(cs.bg));
  theShader.setUniform("u_formColor",hexToRGB(cs.form));
  theShader.setUniform("u_hiColor",hexToRGB(cs.hi));
  theShader.setUniform("u_bgValue",cs.bgVal);
  theShader.setUniform("u_formSat",cs.fSat);
  theShader.setUniform("u_formValue",cs.fVal);
  theShader.setUniform("u_rim",cs.rim);
  noStroke();
  quad(-1,-1,1,-1,1,1,-1,1);
}

const ALL_MODULES=[
  {id:"grid_extrude",title:"grid extrude"},{id:"sdf_raymarch",title:"sdf raymarch"},
  {id:"gyroid",title:"gyroid"},{id:"displacement",title:"displacement"},
  {id:"displacement_primitives",title:"displacement primitives"},
  {id:"mandelbulb",title:"mandelbulb"},{id:"fold",title:"fold"},
  {id:"flow_field",title:"flow field"},{id:"reaction_diffusion",title:"reaction diffusion"},
  {id:"voronoi",title:"voronoi"},{id:"contour_field",title:"contour field"},
  {id:"truchet",title:"truchet"},{id:"truchet_b",title:"truchet // color"},
  {id:"l_system",title:"l-system"},{id:"cellular_erosion",title:"cellular erosion"},
  {id:"recursive_grid",title:"recursive grid"},{id:"wave_interference",title:"wave interference"},
  {id:"stipple",title:"stipple"},
  {id:"hex_grid",title:"hex grid"},{id:"rose_curve",title:"rose curve"},
  {id:"lissajous_mesh",title:"lissajous mesh"},{id:"torus_knot",title:"torus knot"},
];
function buildNav(){
  const idx=ALL_MODULES.findIndex(m=>m.id===PIECE);if(idx<0)return;
  const prev=ALL_MODULES[(idx-1+ALL_MODULES.length)%ALL_MODULES.length];
  const next=ALL_MODULES[(idx+1)%ALL_MODULES.length];
  const np=document.getElementById("navPrev");if(np){np.href="../"+prev.id+"/noixzy_"+prev.id+".html";np.title=prev.title;}
  const nn=document.getElementById("navNext");if(nn){nn.href="../"+next.id+"/noixzy_"+next.id+".html";nn.title=next.title;}
  const strip=document.getElementById("moduleThumbStrip");if(!strip)return;
  ALL_MODULES.forEach(m=>{
    const a=document.createElement("a");a.href="../"+m.id+"/noixzy_"+m.id+".html";a.title=m.title;
    a.className="navThumb"+(m.id===PIECE?" active":"");
    const img=document.createElement("img");img.src="../gallery/thumbs/"+m.id+".png";img.alt=m.title;
    a.appendChild(img);strip.appendChild(a);
  });
  setTimeout(()=>{const el=strip.querySelector(".active");if(el){const off=el.offsetLeft-strip.offsetWidth/2+el.offsetWidth/2;strip.scrollLeft=Math.max(0,off);}},50);
}
</script>
</body>
</html>
