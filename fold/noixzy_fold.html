<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>noixzy // fold</title>
<link rel="icon" href="data:,">
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<style>
  :root { --bg:#0e0e10; --panel:#101316; --ink:#e8e8ea; --accent:#48dfff; --lime:#b7ff3c; --dim:#8b969c; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--ink); font:13px/1.4 ui-monospace,SFMono-Regular,Menlo,monospace; }
  .app { display:flex; flex-direction:row; align-items:stretch; height:100vh; }
  .stage { position:relative; flex:1 1 auto; min-width:0; background:#000; }
  .stage canvas { display:block; width:100%; height:100%; }
  .panel { position:relative; width:316px; box-sizing:border-box; margin:14px; max-height:calc(100vh - 28px); overflow-y:auto;
           background:rgba(12,15,18,0.72); -webkit-backdrop-filter:blur(13px); backdrop-filter:blur(13px);
           border:1px solid rgba(72,223,255,0.20); padding:14px; border-radius:9px; box-shadow:0 10px 34px rgba(0,0,0,0.45); }
  .panel.hidden { opacity:0; pointer-events:none; }
  .panel h1 { font-size:13px; letter-spacing:.12em; text-transform:lowercase; margin:0 0 12px; color:var(--accent); }
  .row { margin:11px 0; padding:3px 0 5px 8px; border-left:2px solid transparent; }
  .row label { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:5px; opacity:.9; }
  input[type=range] { width:100%; height:30px; accent-color:var(--accent); }
  .colorRow { display:grid; grid-template-columns:1fr 48px; gap:10px; align-items:end; }
  input[type=color] { width:48px; height:36px; padding:0; border:1px solid #333; border-radius:4px; background:#000; cursor:pointer; }
  input[type=color]:hover { border-color:var(--accent); }
  input[type=number], input[type=text], select { box-sizing:border-box; min-height:36px; background:#000; color:var(--ink); border:1px solid #333; padding:7px 8px; font:inherit; border-radius:4px; }
  button { min-height:36px; background:#000; color:var(--ink); border:1px solid #333; padding:7px 10px; font:inherit; cursor:pointer; border-radius:4px; }
  button:hover { border-color:var(--accent); color:var(--accent); }
  .tools { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:14px 0; }
  .presetBox { margin-top:12px; padding-top:12px; border-top:1px solid rgba(72,223,255,0.18); }
  .presetLine { display:grid; grid-template-columns:1fr auto; gap:8px; margin-top:8px; }
  select { width:100%; margin-top:2px; }
  select:hover { border-color:var(--accent); }
  .hint { margin-top:8px; opacity:.4; font-size:11px; }
  @media (max-width:900px){ .app{flex-direction:column;} .panel{width:100%; margin:0; max-height:40vh;} .stage{height:calc(100vh - 40vh);} }
</style>
</head>
<body>
<div class="app">
  <div id="stage" class="stage"></div>
  <div class="panel" id="panel">
    <h1>noixzy // fold</h1>

    <div class="row" style="margin-bottom:10px">
      <label>theme</label>
      <div style="display:flex;gap:8px;align-items:center">

      </div>
    </div>

    <div class="row"><label>scale <span id="vScale">—</span></label>
      <input id="sScale" type="range" min="0" max="1" step="0.01" value="0.42"></div>
    <div class="row"><label>offset <span id="vOffset">—</span></label>
      <input id="sOffset" type="range" min="0" max="1" step="0.01" value="0.55"></div>
    <div class="row"><label>twist <span id="vTwist">—</span></label>
      <input id="sTwist" type="range" min="0" max="1" step="0.01" value="0.0"></div>
    <div class="row"><label>morph amount <span id="vMorph">—</span></label>
      <input id="sMorph" type="range" min="0" max="1" step="0.01" value="0.15"></div>
    <div class="row"><label>inner rotate <span id="vInnerRot">—</span></label>
      <input id="sInnerRot" type="range" min="-1" max="1" step="0.01" value="0.35"></div>
    <div class="row"><label>inner shift <span id="vInnerShift">—</span></label>
      <input id="sInnerShift" type="range" min="-1" max="1" step="0.01" value="0.18"></div>
    <div class="row"><label>spin <span id="vSpin">—</span></label>
      <input id="sSpin" type="range" min="0" max="1" step="0.01" value="0.2"></div>
    <div class="row"><label>distance <span id="vDist">—</span></label>
      <input id="sDist" type="range" min="0" max="1" step="0.01" value="0.50"></div>
    <div class="row"><label>elevation <span id="vElev">—</span></label>
      <input id="sElev" type="range" min="0" max="1" step="0.01" value="0.46"></div>
    <div class="row"><label>ao <span id="vAO">—</span></label>
      <input id="sAO" type="range" min="0" max="1" step="0.01" value="0.45"></div>
    <div class="row"><label>lens <span id="vZoom">—</span></label>
      <input id="sZoom" type="range" min="0" max="1" step="0.01" value="0.55"></div>
    <div class="row"><label>feature size <span id="vFeat">—</span></label>
      <input id="sFeat" type="range" min="0" max="1" step="0.01" value="0.45"></div>
    <div class="row"><label>palette <span id="vPal">—</span></label>
      <input id="sPal" type="range" min="0" max="11" step="1" value="4"></div>

    <div class="row colorRow"><label for="bgColor">background</label>
      <input id="bgColor" type="color" value="#0c0c0c"></div>
    <div class="row"><label>bg value <span id="vBgVal">—</span></label>
      <input id="sBgVal" type="range" min="0" max="2" step="0.01" value="1"></div>
    <div class="row colorRow"><label for="formColor">form color</label>
      <input id="formColor" type="color" value="#3a3a3a"></div>
    <div class="row colorRow"><label for="hiColor">highlight / rim</label>
      <input id="hiColor" type="color" value="#f2f2f2"></div>
    <div class="row"><label>form saturation <span id="vFormSat">—</span></label>
      <input id="sFormSat" type="range" min="0" max="2" step="0.01" value="1"></div>
    <div class="row"><label>form value <span id="vFormVal">—</span></label>
      <input id="sFormVal" type="range" min="0" max="2" step="0.01" value="1"></div>
    <div class="row"><label>rim strength <span id="vRim">—</span></label>
      <input id="sRim" type="range" min="0" max="2" step="0.01" value="1"></div>

    <div class="tools">
      <button id="btnSave" type="button">save png</button>
      <button id="btnPause" type="button">pause</button>
    </div>

    <div class="presetBox">
      <div class="presetLine">
        <select id="starterPreset"></select>
        <button id="btnLoad" type="button">load</button>
      </div>
    </div>

    <div class="hint">h hide · space pause · [ ] theme · s save</div>
  </div>
</div>

<script id="vert" type="x-shader/x-vertex">
attribute vec3 aPosition;
varying vec2 vUv;
void main(){
  vUv = aPosition.xy;
  gl_Position = vec4(aPosition.xy, 0.0, 1.0);
}
</script>

<script id="frag" type="x-shader/x-fragment">
precision highp float;
varying vec2 vUv;

uniform vec2  u_res;
uniform float u_time;
uniform float u_scale;
uniform float u_offset;
uniform float u_twist;
uniform float u_morph;
uniform float u_innerRot;
uniform float u_innerShift;
uniform float u_spin;
uniform float u_dist;
uniform float u_elev;
uniform float u_ao;
uniform vec3  u_bgColor;
uniform vec3  u_formColor;
uniform vec3  u_hiColor;
uniform float u_bgValue;
uniform float u_formSat;
uniform float u_formValue;
uniform float u_rim;
uniform float u_zoom;
uniform float u_feat;

float map(vec3 p) {
  // Sierpinski tetrahedron IFS — Knighty formula, 6 iterations for visible features
  float sc = mix(1.85, 2.4, u_scale);
  float C  = mix(0.82, 1.18, u_offset);
  float accSc = 1.0;

  // Object-space spin: shape rotates on its own axis, camera stays locked.
  float spinA = u_time * u_spin * 0.55;
  float ca=cos(spinA), sa=sin(spinA);
  p.xz = vec2(ca*p.x - sa*p.z, sa*p.x + ca*p.z);

  // Orientation
  float tw = u_twist * 2.4;
  float ct=cos(tw), st=sin(tw);
  p.xz = vec2(ct*p.x - st*p.z, st*p.x + ct*p.z);
  for(int i = 0; i < 6; i++) {
    if(p.x + p.y < 0.0) p.xy = -p.yx;
    if(p.x + p.z < 0.0) p.xz = -p.zx;
    if(p.y + p.z < 0.0) p.zy = -p.yz;

    // Internal morph: signed rotation + signed instance/location shift.
    float fi = float(i);
    float amp = abs(u_morph);

    float ph = u_time * u_innerRot * 0.42 + fi * 0.73;
    float rAmt = abs(u_innerRot) * amp * 0.18;
    float cp=cos(ph), sp=sin(ph);
    p.xy = mix(p.xy, vec2(cp*p.x - sp*p.y, sp*p.x + cp*p.y), rAmt);
    p.zx = mix(p.zx, vec2(cp*p.z - sp*p.x, sp*p.z + cp*p.x), rAmt * 0.72);

    vec3 shift = vec3(
      sin(ph + fi * 1.31),
      cos(ph * 1.17 - fi),
      sin(ph * 0.83 + fi * 1.79)
    ) * (u_innerShift * amp * 0.085);
    p += shift;

    p = p * sc - vec3(C) * (sc - 1.0);
    accSc *= sc;
  }

  return length(p) / accSc;
}

vec3 calcNormal(vec3 p) {
  vec2 e = vec2(0.001, 0.0);
  return normalize(vec3(
    map(p+e.xyy)-map(p-e.xyy),
    map(p+e.yxy)-map(p-e.yxy),
    map(p+e.yyx)-map(p-e.yyx)));
}

float calcAO(vec3 pos, vec3 nor) {
  float occ = 0.0, d;
  d=map(pos+nor*0.04); occ+=(0.04-d)*1.2;
  d=map(pos+nor*0.10); occ+=(0.10-d)*0.9;
  d=map(pos+nor*0.18); occ+=(0.18-d)*0.65;
  d=map(pos+nor*0.28); occ+=(0.28-d)*0.45;
  return clamp(1.0 - 2.2*occ, 0.0, 1.0);
}

void main() {
  vec2 uv = vUv;
  uv.x *= u_res.x / u_res.y;

  float el      = mix(-1.15, 1.55, u_elev);
  float camDist = mix(2.25, 5.60, u_dist);
  vec3 ro  = vec3(0.0, el, camDist);
  vec3 ta  = vec3(0.0, 0.0, 0.0);
  vec3 fw  = normalize(ta - ro);
  vec3 rt  = normalize(cross(vec3(0.0,1.0,0.0), fw));
  vec3 up  = cross(fw, rt);
  float lens = mix(2.45, 1.35, u_zoom);
  vec3 rd  = normalize(fw*lens + rt*uv.x + up*uv.y);

  float tt  = 0.05;
  bool  hit = false;

  for(int i = 0; i < 200; i++) {
    float d = map(ro + rd*tt);
    float hitEps = mix(0.003, 0.009, u_feat);
    if(d < hitEps) { hit = true; break; }
    if(tt > 14.0) break;
    tt += d * 0.32;
  }

  float y = vUv.y * 0.5 + 0.5;
  vec3 bgBase = max(u_bgColor * u_bgValue, vec3(0.0));
  vec3 bg  = mix(bgBase*0.55, bgBase*1.12, y);
  float bvig = smoothstep(1.5, 0.0, length(vUv*0.85));
  bg = mix(bg*0.7, bg, bvig);
  vec3 col = bg;

  if(hit) {
    vec3  p  = ro + rd*tt;
    vec3  n  = calcNormal(p);
    float ao = mix(1.0, calcAO(p, n), u_ao);

    vec3  ld  = normalize(vec3(0.55, 0.88, 0.48));
    float dif = clamp(dot(n, ld)*0.5 + 0.5, 0.0, 1.0);
    float rim = pow(clamp(1.0 - dot(n, -rd), 0.0, 1.0), 2.5);
    float spec= pow(clamp(dot(reflect(-ld,n), -rd), 0.0, 1.0), 30.0);
    float fres= pow(clamp(1.0 - dot(n, -rd), 0.0, 1.0), 5.0);

    float luma   = dot(u_formColor, vec3(0.2126,0.7152,0.0722));
    vec3 baseCol = mix(vec3(luma), u_formColor, u_formSat) * u_formValue;

    // depth color — deeper recursion zones pick up highlight tint
    float depth = clamp(1.0 - tt / 12.0, 0.0, 1.0);
    baseCol = mix(baseCol, u_hiColor * u_formValue, depth * 0.22 * u_rim);

    col  = baseCol * mix(0.42, 1.12, dif);
    col  = mix(col, u_hiColor*u_formValue, smoothstep(0.55,0.92,dif)*0.38*u_rim);
    col += rim  * u_hiColor * 0.32 * u_rim;
    col += spec * u_hiColor * 0.16 * u_rim;
    col += fres * u_hiColor * 0.06 * u_rim;
    col  = col * mix(0.35, 1.0, ao);

    float fog = clamp((tt - 3.0) / 11.0, 0.0, 0.5);
    col = mix(col, bg, fog * 0.45);
  }

  float vig = smoothstep(1.42, 0.15, length(vUv));
  col *= mix(0.74, 1.0, vig);
  col  = pow(clamp(col, 0.0, 1.0), vec3(0.83));
  gl_FragColor = vec4(col, 1.0);
}
</script>

<script>
const PIECE = "fold";
const THEMEKEY = "noixzy_lab_theme";
const PALETTES = [
  ["ember",    "#0e0e10", "#5a2400", "#ed8a3a"],
  ["mineral",  "#071414", "#0f403a", "#7fe0c2"],
  ["violet",   "#100c18", "#2c2660", "#b7b0ff"],
  ["amber",    "#140d06", "#5a3414", "#f0c890"],
  ["graphite", "#0c0c0c", "#3a3a3a", "#f2f2f2"],
  ["cyan",     "#071018", "#103f5a", "#72d8ff"],
  ["acid",     "#0a1207", "#2d4f13", "#c7ff4a"],
  ["magenta",  "#16070e", "#5a1232", "#ff6aa6"],
  ["gold",     "#15100a", "#6b4514", "#ffe0a0"],
  ["neutral",  "#0f1115", "#222b34", "#b7c1ca"],
  ["copper",   "#140b0b", "#612626", "#ff9a7a"],
  ["ice",      "#090d18", "#17305f", "#9bc8ff"],
];
const THEME_NAMES = PALETTES.map(p=>p[0]);

const STARTERS = [
  { name:"graphite cube",  palIdx:4, bg:"#0c0c0c", form:"#3a3a3a", hi:"#f2f2f2", bgVal:1.0, fSat:0.0, fVal:1.0, rim:0.9,  scale:0.42, offset:0.55, twist:0.0,  morph:0.15, innerRot:0.35, innerShift:0.18, dist:0.50, elev:0.46, spin:0.2,  ao:0.45, zoom:0.55, feat:0.50 },
  { name:"crystal coral",  palIdx:1, bg:"#050f0f", form:"#0c3830", hi:"#7fe0c2", bgVal:0.88, fSat:0.9, fVal:0.95, rim:1.1,  scale:0.55, offset:0.45, twist:0.18, morph:0.25, innerRot:0.48, innerShift:0.22, dist:0.52, elev:0.50, spin:0.18, ao:0.45, zoom:0.55, feat:0.42 },
  { name:"amber lattice",  palIdx:3, bg:"#100c06", form:"#503010", hi:"#f0c890", bgVal:0.9,  fSat:1.0, fVal:0.92, rim:1.0,  scale:0.38, offset:0.62, twist:0.08, morph:0.2,  innerRot:-0.32, innerShift:0.14, dist:0.46, elev:0.44, spin:0.22, ao:0.42, zoom:0.50, feat:0.45 },
  { name:"cyan shard",     palIdx:5, bg:"#04101a", form:"#0e3f5c", hi:"#72d8ff", bgVal:0.82, fSat:1.1, fVal:0.9, rim:1.3,  scale:0.48, offset:0.5,  twist:0.3,  morph:0.3,  innerRot:0.62, innerShift:-0.20, dist:0.54, elev:0.48, spin:0.25, ao:0.45, zoom:0.60, feat:0.40 },
  { name:"acid maze",      palIdx:6, bg:"#070f04", form:"#254210", hi:"#c7ff4a", bgVal:0.78, fSat:1.2, fVal:0.88, rim:1.2,  scale:0.62, offset:0.4,  twist:0.22, morph:0.4,  innerRot:-0.55, innerShift:0.28, dist:0.48, elev:0.52, spin:0.28, ao:0.48, zoom:0.52, feat:0.48 },
  { name:"deep twist",     palIdx:2, bg:"#0a0818", form:"#24206a", hi:"#b7b0ff", bgVal:0.8,  fSat:1.0, fVal:0.95, rim:1.1,  scale:0.35, offset:0.68, twist:0.55, morph:0.35, innerRot:0.26, innerShift:-0.16, dist:0.58, elev:0.45, spin:0.15, ao:0.45, zoom:0.55, feat:0.44 },
  { name:"gold mineral",   palIdx:8, bg:"#100e08", form:"#604010", hi:"#ffe0a0", bgVal:0.92, fSat:1.0, fVal:0.95, rim:1.05, scale:0.44, offset:0.58, twist:0.12, morph:0.18, innerRot:0.38, innerShift:0.12, dist:0.50, elev:0.47, spin:0.2,  ao:0.42, zoom:0.55, feat:0.46 },
];

let cs = { bg:"#0c0c0c", form:"#3a3a3a", hi:"#f2f2f2", bgVal:1, fSat:1, fVal:1, rim:1 };
let P  = { scale:0.42, offset:0.55, twist:0.0, morph:0.15, innerRot:0.35, innerShift:0.18, spin:0.2, dist:0.50, elev:0.46, ao:0.45, zoom:0.55, feat:0.45 };
let t0, paused=false, pauseT=0, theShader;

function hexToRGB(h){ return [parseInt(h.slice(1,3),16)/255,parseInt(h.slice(3,5),16)/255,parseInt(h.slice(5,7),16)/255]; }
function clampV(v,a,b){ return Math.min(b,Math.max(a,v)); }

function applyPalette(idx) {
  const pal = PALETTES[clampV(Math.round(idx),0,PALETTES.length-1)];
  cs.bg=pal[1]; cs.form=pal[2]; cs.hi=pal[3]; cs.bgVal=1; cs.fSat=1; cs.fVal=1; cs.rim=1;
  syncColorUI();
}

function syncColorUI() {
  document.getElementById("bgColor").value   = cs.bg;
  document.getElementById("formColor").value = cs.form;
  document.getElementById("hiColor").value   = cs.hi;
  [["sBgVal","vBgVal","bgVal"],["sFormSat","vFormSat","fSat"],["sFormVal","vFormVal","fVal"],["sRim","vRim","rim"]].forEach(([sid,vid,k])=>{
    document.getElementById(sid).value = cs[k];
    document.getElementById(vid).textContent = cs[k].toFixed(2);
  });
}

function syncParamUI() {
  [["sScale","vScale","scale"],["sOffset","vOffset","offset"],["sTwist","vTwist","twist"],
   ["sMorph","vMorph","morph"],["sInnerRot","vInnerRot","innerRot"],["sInnerShift","vInnerShift","innerShift"],["sSpin","vSpin","spin"],["sDist","vDist","dist"],["sElev","vElev","elev"],["sAO","vAO","ao"],
   ["sZoom","vZoom","zoom"],["sFeat","vFeat","feat"]].forEach(([sid,vid,k])=>{
    document.getElementById(sid).value = P[k];
    document.getElementById(vid).textContent = P[k].toFixed(2);
  });
}

function loadStarter(s) {
  P.scale=s.scale; P.offset=s.offset; P.twist=s.twist; P.morph=s.morph; P.innerRot=(s.innerRot ?? P.innerRot); P.innerShift=(s.innerShift ?? P.innerShift); P.spin=s.spin; P.dist=(s.dist ?? P.dist); P.elev=(s.elev ?? P.elev); P.ao=s.ao;
  P.zoom = s.zoom ?? 0.55; P.feat = s.feat ?? 0.45;
  cs.bg=s.bg; cs.form=s.form; cs.hi=s.hi; cs.bgVal=s.bgVal; cs.fSat=s.fSat; cs.fVal=s.fVal; cs.rim=s.rim;
  document.getElementById("sPal").value = s.palIdx;
  document.getElementById("vPal").textContent = `${s.palIdx} ${PALETTES[s.palIdx][0]}`;
  syncParamUI(); syncColorUI();
}

let activeTheme = null;
function applyTheme(name) {
  const idx = THEME_NAMES.indexOf(name); if(idx<0) return;
  activeTheme=name; applyPalette(idx);
  document.getElementById("sPal").value = idx;
  document.getElementById("vPal").textContent = `${idx} ${name}`;
  const sel = document.getElementById("themeSelect"); if(sel) sel.value=name;
  try{ localStorage.setItem(THEMEKEY, name); }catch(e){}
}
function cycleTheme(dir) {
  const idx = THEME_NAMES.indexOf(activeTheme);
  applyTheme(THEME_NAMES[((idx<0?0:idx)+dir+THEME_NAMES.length)%THEME_NAMES.length]);
}

function setup() {
  const stage = document.getElementById("stage");
  const c = createCanvas(stage.clientWidth, stage.clientHeight, WEBGL);
  c.parent(stage);
  theShader = createShader(
    document.getElementById("vert").textContent,
    document.getElementById("frag").textContent
  );
  t0 = millis();

  const tSel = document.getElementById("themeSelect");
  THEME_NAMES.forEach(n=>{ const o=document.createElement("option"); o.value=n; o.textContent=n; tSel.appendChild(o); });
  tSel.addEventListener("change", e=>applyTheme(e.target.value));

  [["sScale","vScale","scale"],["sOffset","vOffset","offset"],["sTwist","vTwist","twist"],
   ["sMorph","vMorph","morph"],["sInnerRot","vInnerRot","innerRot"],["sInnerShift","vInnerShift","innerShift"],["sSpin","vSpin","spin"],["sDist","vDist","dist"],["sElev","vElev","elev"],["sAO","vAO","ao"],
   ["sZoom","vZoom","zoom"],["sFeat","vFeat","feat"]].forEach(([sid,vid,k])=>{
    const el=document.getElementById(sid);
    el.addEventListener("input", ()=>{ P[k]=parseFloat(el.value); document.getElementById(vid).textContent=P[k].toFixed(2); });
  });

  document.getElementById("bgColor").addEventListener("input",   e=>{ cs.bg=e.target.value; });
  document.getElementById("formColor").addEventListener("input",  e=>{ cs.form=e.target.value; });
  document.getElementById("hiColor").addEventListener("input",    e=>{ cs.hi=e.target.value; });
  [["sBgVal","vBgVal","bgVal"],["sFormSat","vFormSat","fSat"],["sFormVal","vFormVal","fVal"],["sRim","vRim","rim"]].forEach(([sid,vid,k])=>{
    document.getElementById(sid).addEventListener("input", e=>{ cs[k]=parseFloat(e.target.value); document.getElementById(vid).textContent=cs[k].toFixed(2); });
  });

  document.getElementById("sPal").addEventListener("input", e=>{
    const idx=parseInt(e.target.value);
    document.getElementById("vPal").textContent=`${idx} ${PALETTES[idx][0]}`;
    applyPalette(idx); activeTheme=PALETTES[idx][0];
    const sel=document.getElementById("themeSelect"); if(idx<THEME_NAMES.length&&sel) sel.value=PALETTES[idx][0];
  });

  const ss=document.getElementById("starterPreset");
  STARTERS.forEach((s,i)=>{ const o=document.createElement("option"); o.value=i; o.textContent=s.name; ss.appendChild(o); });
  document.getElementById("btnLoad").addEventListener("click", ()=>{ loadStarter(STARTERS[parseInt(ss.value)]); });
  document.getElementById("btnSave").addEventListener("click", ()=>{ saveCanvas(`noixzy_${PIECE}_${Math.floor(millis())}`, "png"); });
  document.getElementById("btnPause").addEventListener("click", ()=>{
    paused=!paused;
    if(paused) pauseT=millis()-t0; else t0=millis()-pauseT;
    document.getElementById("btnPause").textContent=paused?"play":"pause";
  });

  document.addEventListener("keydown", e=>{
    if(e.key==="h") document.getElementById("panel").classList.toggle("hidden");
    if(e.key===" "){ e.preventDefault(); document.getElementById("btnPause").click(); }
    if(e.key==="[") cycleTheme(-1);
    if(e.key==="]") cycleTheme(1);
    if(e.key==="s") document.getElementById("btnSave").click();
  });

  const saved=localStorage.getItem(THEMEKEY);
  if(saved && THEME_NAMES.includes(saved)) applyTheme(saved); else applyTheme("graphite");
  syncParamUI(); syncColorUI();
  document.getElementById("vPal").textContent=`${document.getElementById("sPal").value} ${PALETTES[parseInt(document.getElementById("sPal").value)][0]}`;
  window.addEventListener("resize", ()=>{ resizeCanvas(stage.clientWidth, stage.clientHeight); });
}

function draw() {
  if(paused) return;
  const t = (millis() - t0) / 1000.0;
  shader(theShader);
  theShader.setUniform("u_res",       [width, height]);
  theShader.setUniform("u_time",      t);
  theShader.setUniform("u_scale",     P.scale);
  theShader.setUniform("u_offset",    P.offset);
  theShader.setUniform("u_twist",     P.twist);
  theShader.setUniform("u_morph",     P.morph);
  theShader.setUniform("u_innerRot",  P.innerRot);
  theShader.setUniform("u_innerShift",P.innerShift);
  theShader.setUniform("u_spin",      P.spin);
  theShader.setUniform("u_dist",      P.dist);
  theShader.setUniform("u_elev",      P.elev);
  theShader.setUniform("u_ao",        P.ao);
  theShader.setUniform("u_bgColor",   hexToRGB(cs.bg));
  theShader.setUniform("u_formColor", hexToRGB(cs.form));
  theShader.setUniform("u_hiColor",   hexToRGB(cs.hi));
  theShader.setUniform("u_bgValue",   cs.bgVal);
  theShader.setUniform("u_formSat",   cs.fSat);
  theShader.setUniform("u_formValue", cs.fVal);
  theShader.setUniform("u_rim",       cs.rim);
  theShader.setUniform("u_zoom",      P.zoom);
  theShader.setUniform("u_feat",      P.feat);
  noStroke();
  quad(-1,-1, 1,-1, 1,1, -1,1);
}
</script>
</body>
</html>
