<script id="vert" type="x-shader/x-vertex">
attribute vec3 aPosition;
varying vec2 vUv;
void main(){
  vUv = aPosition.xy;
  gl_Position = vec4(aPosition.xy, 0.0, 1.0);
}
</script>

<script id="frag" type="x-shader/x-fragment">
precision highp float;
varying vec2 vUv;

uniform vec2  u_res;
uniform float u_time;
uniform float u_scale;
uniform float u_threshold;
uniform float u_phase;
uniform float u_spin;
uniform float u_azimuth;
uniform float u_dist;
uniform float u_elev;
uniform float u_ao;
uniform vec3  u_bgColor;
uniform vec3  u_formColor;
uniform vec3  u_hiColor;
uniform float u_bgValue;
uniform float u_formSat;
uniform float u_formValue;
uniform float u_rim;

float gyroid(vec3 q) {
  return sin(q.x)*cos(q.y) + sin(q.y)*cos(q.z) + sin(q.z)*cos(q.x);
}

float map(vec3 p) {
  float sc = mix(0.7, 4.2, u_scale);
  float ph = u_time * u_phase * 0.5;
  vec3 q = p * sc;
  float g = sin(q.x)*cos(q.y+ph) + sin(q.y)*cos(q.z+ph) + sin(q.z)*cos(q.x+ph);
  float shell = (abs(g) - u_threshold * 0.45) / sc;
  float sphere = length(p) - 2.1;
  return max(shell, sphere);
}

vec3 calcNormal(vec3 p) {
  vec2 e = vec2(0.002, 0.0);
  return normalize(vec3(
    map(p+e.xyy)-map(p-e.xyy),
    map(p+e.yxy)-map(p-e.yxy),
    map(p+e.yyx)-map(p-e.yyx)));
}

float calcAO(vec3 pos, vec3 nor) {
  float occ = 0.0, d;
  d=map(pos+nor*0.05); occ+=(0.05-d)*1.0;
  d=map(pos+nor*0.12); occ+=(0.12-d)*0.8;
  d=map(pos+nor*0.22); occ+=(0.22-d)*0.6;
  d=map(pos+nor*0.36); occ+=(0.36-d)*0.4;
  return clamp(1.0 - 1.8*occ, 0.0, 1.0);
}

void main() {
  vec2 uv = vUv;
  uv.x *= u_res.x / u_res.y;

  float a = u_azimuth + u_time * u_spin * 0.38;
  float elev = u_elev + 0.22*sin(u_time * 0.13);
  vec3 ro = vec3(sin(a)*u_dist, elev, cos(a)*u_dist);
  vec3 ta = vec3(0.0);
  vec3 fw = normalize(ta - ro);
  vec3 rt = normalize(cross(vec3(0.0, 1.0, 0.0), fw));
  vec3 up = cross(fw, rt);
  vec3 rd = normalize(fw*1.9 + rt*uv.x + up*uv.y);

  float tt = 0.8;
  bool hit = false;
  for(int i = 0; i < 100; i++) {
    float d = map(ro + rd * tt);
    if(d < 0.0008) { hit = true; break; }
    if(tt > 14.0) break;
    tt += d * 0.55;
  }

  float y = vUv.y * 0.5 + 0.5;
  vec3 bgBase = max(u_bgColor * u_bgValue, vec3(0.0));
  vec3 bg = mix(bgBase * 0.62, bgBase * 1.08, y);
  float bvig = smoothstep(1.45, 0.0, length(vUv * 0.88));
  bg = mix(bg * 0.76, bg, bvig);
  vec3 col = bg;

  if(hit) {
    vec3 p = ro + rd * tt;
    vec3 n = calcNormal(p);
    float ao = mix(1.0, calcAO(p, n), u_ao);

    vec3 ld = normalize(vec3(0.65, 0.85, 0.5));
    float dif = clamp(dot(n, ld)*0.5 + 0.5, 0.0, 1.0);
    float rim = pow(clamp(1.0 - dot(n, -rd), 0.0, 1.0), 2.8);
    float spec = pow(clamp(dot(reflect(-ld, n), -rd), 0.0, 1.0), 28.0);
    float fres = pow(clamp(1.0 - dot(n, -rd), 0.0, 1.0), 4.5);

    float luma = dot(u_formColor, vec3(0.2126, 0.7152, 0.0722));
    vec3 baseCol = mix(vec3(luma), u_formColor, u_formSat);
    baseCol *= u_formValue;

    col = baseCol * mix(0.48, 1.08, dif);
    col = mix(col, u_hiColor * u_formValue, smoothstep(0.55, 0.95, dif) * 0.4 * u_rim);
    col += rim  * u_hiColor * 0.32 * u_rim;
    col += spec * u_hiColor * 0.18 * u_rim;
    col += fres * u_hiColor * 0.08 * u_rim;
    col *= ao;

    float depthFog = clamp((tt - 3.0) / 11.0, 0.0, 0.55);
    col = mix(col, bg, depthFog * 0.5);
  }

  float vig = smoothstep(1.42, 0.18, length(vUv));
  col *= mix(0.76, 1.0, vig);
  col = pow(clamp(col, 0.0, 1.0), vec3(0.84));
  gl_FragColor = vec4(col, 1.0);
}
</script>

<script>
const PIECE = "gyroid";
let _thumbDir=null,_pCanvas=null;
function _captureThumb(){
  const src=_pCanvas||document.querySelector("canvas");
  const c=document.createElement("canvas"); c.width=400; c.height=300;
  c.getContext("2d").drawImage(src,0,0,400,300);
  return c;
}
async function saveThumb(){
  const btn=document.getElementById("btnThumb");
  try{
    if(!_thumbDir) _thumbDir=await window.showDirectoryPicker({mode:"readwrite",startIn:"downloads"});
    const blob=await new Promise(res=>_captureThumb().toBlob(res,"image/png"));
    const fh=await _thumbDir.getFileHandle(PIECE+".png",{create:true});
    const w=await fh.createWritable(); await w.write(blob); await w.close();
    if(btn){btn.textContent="✓ saved";setTimeout(()=>btn.textContent="→ thumb",1400);}
  }catch(e){
    if(e.name!=="AbortError"){
      _captureThumb().toBlob(b=>{
        const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=PIECE+".png";a.click();
        if(btn){btn.textContent="✓ dl";setTimeout(()=>btn.textContent="→ thumb",1400);}
      },"image/png");
    }
  }
}
const THEMEKEY = "noixzy_lab_theme";
const PALETTES = [
  ["ember",    "#0e0e10", "#5a2400", "#ed8a3a"],
  ["mineral",  "#071414", "#0f403a", "#7fe0c2"],
  ["violet",   "#100c18", "#2c2660", "#b7b0ff"],
  ["amber",    "#140d06", "#5a3414", "#f0c890"],
  ["graphite", "#0c0c0c", "#3a3a3a", "#f2f2f2"],
  ["cyan",     "#071018", "#103f5a", "#72d8ff"],
  ["acid",     "#0a1207", "#2d4f13", "#c7ff4a"],
  ["magenta",  "#16070e", "#5a1232", "#ff6aa6"],
  ["gold",     "#15100a", "#6b4514", "#ffe0a0"],
  ["neutral",  "#0f1115", "#222b34", "#b7c1ca"],
  ["copper",   "#140b0b", "#612626", "#ff9a7a"],
  ["ice",      "#090d18", "#17305f", "#9bc8ff"],
];
const THEME_NAMES = PALETTES.map(p=>p[0]);

const STARTERS = [
  { name:"graphite",  palIdx:4, bg:"#0c0c0c", form:"#3a3a3a", hi:"#f2f2f2", bgVal:1.0, fSat:0.0, fVal:1.0, rim:0.9, scale:0.42, thresh:0.22, phase:0.25, spin:0.22, ao:0.62 },
  { name:"cyan void", palIdx:5, bg:"#040e15", form:"#0f4060", hi:"#72d8ff", bgVal:0.85, fSat:1.1, fVal:0.95, rim:1.3, scale:0.55, thresh:0.18, phase:0.38, spin:0.28, ao:0.55 },
  { name:"acid shell",palIdx:6, bg:"#080e05", form:"#2a4f10", hi:"#c7ff4a", bgVal:0.78, fSat:1.2, fVal:0.9,  rim:1.2, scale:0.35, thresh:0.28, phase:0.45, spin:0.18, ao:0.7  },
  { name:"mineral",   palIdx:1, bg:"#050f0f", form:"#0c3830", hi:"#7fe0c2", bgVal:0.88, fSat:0.9, fVal:1.0, rim:1.0, scale:0.48, thresh:0.20, phase:0.3,  spin:0.3,  ao:0.58 },
  { name:"violet",    palIdx:2, bg:"#0b081a", form:"#28226a", hi:"#b7b0ff", bgVal:0.82, fSat:1.0, fVal:0.95, rim:1.1, scale:0.38, thresh:0.25, phase:0.5,  spin:0.2,  ao:0.65 },
];

let cs = {
  bg:"#0c0c0c", form:"#3a3a3a", hi:"#f2f2f2",
  bgVal:1, fSat:1, fVal:1, rim:1
};
let P = { scale:0.42, thresh:0.22, phase:0.3, spin:0.25, dist:4.8, elev:0.9, ao:0.6 };
let t0, paused=false, pauseT=0, theShader;
let _camAzimuth=0,_drag={active:false,x:0,y:0};
function _initOrbit(stg){
  stg.addEventListener("pointerdown",e=>{_drag={active:true,x:e.clientX,y:e.clientY};stg.setPointerCapture(e.pointerId);},{passive:true});
  stg.addEventListener("pointermove",e=>{if(!_drag.active)return;_camAzimuth+=(e.clientX-_drag.x)*0.012;P.elev=clampV(P.elev-(e.clientY-_drag.y)*0.007,-1.5,2.5);_drag.x=e.clientX;_drag.y=e.clientY;const se=document.getElementById("sElev");if(se){se.value=P.elev;document.getElementById("vElev").textContent=P.elev.toFixed(2);}},{passive:true});
  stg.addEventListener("pointerup",()=>{_drag.active=false;});
  stg.addEventListener("wheel",e=>{e.preventDefault();P.dist=clampV(P.dist+e.deltaY*0.005,2.6,8);const sd=document.getElementById("sDist");if(sd){sd.value=P.dist;document.getElementById("vDist").textContent=P.dist.toFixed(2);}},{passive:false});
}
let audioCtx,analyser,audioData,audioActive=false;
const ABANDS={bass:0,mid:0,high:0,presence:0};
const AMAP={bass:null,mid:null,high:null,presence:null};
const ADEPTH={bass:0.5,mid:0.5,high:0.5,presence:0.5};
let _audioSaved={},_favs=[];
const _pAudioParams=[
  {k:'scale',sid:'sScale',label:'scale',min:0,max:1},
  {k:'thresh',sid:'sThresh',label:'thresh',min:0,max:1},
  {k:'phase',sid:'sPhase',label:'phase',min:0,max:1},
  {k:'spin',sid:'sSpin',label:'spin',min:0,max:1},
  {k:'dist',sid:'sDist',label:'dist',min:2.6,max:8},
  {k:'elev',sid:'sElev',label:'elev',min:-1.5,max:2.5},
  {k:'ao',sid:'sAO',label:'ao',min:0,max:1},
];

function hexToRGB(h){ return [parseInt(h.slice(1,3),16)/255, parseInt(h.slice(3,5),16)/255, parseInt(h.slice(5,7),16)/255]; }
function clampV(v,a,b){ return Math.min(b,Math.max(a,v)); }

function applyPalette(idx) {
  const pal = PALETTES[clampV(Math.round(idx),0,PALETTES.length-1)];
  cs.bg   = pal[1];
  cs.form = pal[2];
  cs.hi   = pal[3];
  cs.bgVal=1; cs.fSat=1; cs.fVal=1; cs.rim=1;
  syncColorUI();
}

function syncColorUI() {
  document.getElementById("bgColor").value   = cs.bg;
  document.getElementById("formColor").value = cs.form;
  document.getElementById("hiColor").value   = cs.hi;
  const bv=document.getElementById("sBgVal"),fs=document.getElementById("sFormSat"),fv=document.getElementById("sFormVal"),rm=document.getElementById("sRim");
  bv.value=cs.bgVal; fs.value=cs.fSat; fv.value=cs.fVal; rm.value=cs.rim;
  document.getElementById("vBgVal").textContent  = cs.bgVal.toFixed(2);
  document.getElementById("vFormSat").textContent= cs.fSat.toFixed(2);
  document.getElementById("vFormVal").textContent= cs.fVal.toFixed(2);
  document.getElementById("vRim").textContent    = cs.rim.toFixed(2);
}

function syncParamUI() {
  const keys = ["scale","thresh","phase","spin","dist","elev","ao"];
  const ids  = ["sScale","sThresh","sPhase","sSpin","sDist","sElev","sAO"];
  const vids = ["vScale","vThresh","vPhase","vSpin","vDist","vElev","vAO"];
  keys.forEach((k,i)=>{
    document.getElementById(ids[i]).value = P[k];
    document.getElementById(vids[i]).textContent = P[k].toFixed(2);
  });
}

function loadStarter(s) {
  P.scale=s.scale; P.thresh=s.thresh; P.phase=s.phase; P.spin=s.spin; P.dist=(s.dist??4.8); P.elev=(s.elev??0.9); P.ao=s.ao;
  cs.bg=s.bg; cs.form=s.form; cs.hi=s.hi; cs.bgVal=s.bgVal; cs.fSat=s.fSat; cs.fVal=s.fVal; cs.rim=s.rim;
  document.getElementById("sPal").value = s.palIdx;
  document.getElementById("vPal").textContent = `${s.palIdx} ${PALETTES[s.palIdx][0]}`;
  syncParamUI();
  syncColorUI();
}

let activeTheme = null;
function applyTheme(name) {
  const idx = THEME_NAMES.indexOf(name);
  if(idx < 0) return;
  activeTheme = name;
  applyPalette(idx);
  document.getElementById("sPal").value = idx;
  document.getElementById("vPal").textContent = `${idx} ${name}`;
  const sel = document.getElementById("themeSelect");
  if(sel) sel.value = name;
  try{ localStorage.setItem(THEMEKEY, name); }catch(e){}
}
function cycleTheme(dir) {
  const idx = THEME_NAMES.indexOf(activeTheme);
  applyTheme(THEME_NAMES[((idx<0?0:idx)+dir+THEME_NAMES.length)%THEME_NAMES.length]);
}

const _FAV_KEY="noixzy_"+PIECE+"_favs";
function _audioApply(){
  _audioSaved={};
  if(!audioActive||!analyser) return;
  analyser.getByteFrequencyData(audioData);
  const N=audioData.length;
  const avg=(s,e)=>{let v=0;for(let i=s;i<e;i++)v+=audioData[i];return v/((e-s)*255);};
  ABANDS.bass=avg(0,4);ABANDS.mid=avg(4,20);ABANDS.high=avg(20,60);ABANDS.presence=avg(0,N);
  for(const band of['bass','mid','high','presence']){
    const k=AMAP[band];if(!k||P[k]===undefined)continue;
    _audioSaved[k]=P[k];
    const par=_pAudioParams.find(p=>p.k===k);
    const mn=par?par.min:0,mx=par?par.max:1;
    P[k]=Math.min(mx,Math.max(mn,P[k]+ABANDS[band]*ADEPTH[band]*(mx-mn)));
  }
}
function _audioRestore(){for(const k of Object.keys(_audioSaved))P[k]=_audioSaved[k];_audioSaved={};}
function _loadFavs(){try{_favs=JSON.parse(localStorage.getItem(_FAV_KEY)||"[]");}catch(e){_favs=[];}_renderFavs();}
function _saveFavs(){try{localStorage.setItem(_FAV_KEY,JSON.stringify(_favs));}catch(e){}}
function _pinFav(){_favs.push({P:{...P},cs:{...cs}});_saveFavs();_renderFavs();}
function _renderFavs(){
  const fp=document.getElementById("favPanel");if(!fp)return;fp.innerHTML="";
  const fb=document.getElementById("favBtns");if(fb)fb.style.display=_favs.length?"grid":"none";
  _favs.forEach((f,i)=>{
    const b=document.createElement("button");b.textContent="★ "+(i+1);b.style.cssText="font-size:11px;padding:4px;";
    b.addEventListener("click",()=>{
      Object.assign(P,f.P);if(f.cs)Object.assign(cs,f.cs);
      _pAudioParams.forEach(pm=>{const el=document.getElementById(pm.sid);if(el)el.value=P[pm.k];});
    });
    fp.appendChild(b);
  });
}
function _buildAudioUI(){
  const btnAudio=document.getElementById("btnAudio");
  const audioPanel=document.getElementById("audioPanel");
  const audioDropZone=document.getElementById("audioDropZone");
  const audioFileInput=document.getElementById("audioFileInput");
  const audioStatus=document.getElementById("audioStatus");
  const audioPlayPause=document.getElementById("audioPlayPause");
  const audioFilename=document.getElementById("audioFilename");
  const btnMic=document.getElementById("btnMic");
  const audioBands=document.getElementById("audioBands");
  let audioSource=null,audioBuffer=null,audioPlaying=false,micStream=null;
  function _ensureCtx(){if(!audioCtx){audioCtx=new AudioContext();analyser=audioCtx.createAnalyser();analyser.fftSize=512;audioData=new Uint8Array(analyser.frequencyBinCount);}if(audioCtx.state==="suspended")audioCtx.resume();}
  async function _loadFile(file){_ensureCtx();if(audioSource){try{audioSource.stop();}catch(e){}audioSource=null;}const ab=await file.arrayBuffer();audioBuffer=await audioCtx.decodeAudioData(ab);audioFilename.textContent=file.name;audioStatus.style.display="flex";_playBuffer();}
  function _playBuffer(){if(!audioBuffer)return;if(audioSource){try{audioSource.stop();}catch(e){}}audioSource=audioCtx.createBufferSource();audioSource.buffer=audioBuffer;audioSource.loop=true;audioSource.connect(analyser);analyser.connect(audioCtx.destination);audioSource.start();audioPlaying=true;audioPlayPause.textContent="⏸";audioActive=true;}
  audioPlayPause.addEventListener("click",()=>{if(audioPlaying){try{audioSource.stop();}catch(e){}audioPlaying=false;audioActive=false;audioPlayPause.textContent="▶";}else{_playBuffer();}});
  const _lfd=async f=>{if(f&&f.type.startsWith("audio/"))await _loadFile(f);};
  audioDropZone.addEventListener("click",()=>audioFileInput.click());
  audioFileInput.addEventListener("change",e=>{if(e.target.files[0])_lfd(e.target.files[0]);});
  audioDropZone.addEventListener("dragover",e=>{e.preventDefault();audioDropZone.style.borderColor="var(--accent)";});
  audioDropZone.addEventListener("dragleave",()=>{audioDropZone.style.borderColor="#444";});
  audioDropZone.addEventListener("drop",e=>{e.preventDefault();audioDropZone.style.borderColor="#444";_lfd(e.dataTransfer.files[0]);});
  btnMic.addEventListener("click",async()=>{if(micStream){micStream.getTracks().forEach(t=>t.stop());micStream=null;btnMic.textContent="mic";btnMic.style.opacity=".6";if(!audioPlaying)audioActive=false;return;}try{_ensureCtx();micStream=await navigator.mediaDevices.getUserMedia({audio:true});audioCtx.createMediaStreamSource(micStream).connect(analyser);audioActive=true;btnMic.textContent="mic ●";btnMic.style.opacity="1";}catch(e){alert("mic access denied");}});
  btnAudio.addEventListener("click",()=>{const open=audioPanel.style.display==="none";audioPanel.style.display=open?"block":"none";btnAudio.style.color=open?"var(--accent)":"";});
  _pAudioParams.forEach(band_=>{}); // use _pAudioParams for dropdown
  ['bass','mid','high','presence'].forEach(band=>{
    const row=document.createElement("div");row.style.cssText="display:flex;align-items:center;gap:6px;margin-bottom:5px;";
    const lbl=document.createElement("span");lbl.textContent=band;lbl.style.cssText="width:68px;color:#666;";
    const sel=document.createElement("select");sel.style.cssText="flex:1;background:#1a1a1d;color:#e8e8ea;border:1px solid #333;border-radius:4px;padding:2px 4px;font-size:11px;";
    const none=document.createElement("option");none.value="";none.textContent="— off —";sel.appendChild(none);
    _pAudioParams.forEach(p=>{const o=document.createElement("option");o.value=p.k;o.textContent=p.label;sel.appendChild(o);});
    sel.addEventListener("change",()=>{AMAP[band]=sel.value||null;});
    const dep=document.createElement("input");dep.type="range";dep.min=0;dep.max=1;dep.step=.01;dep.value=0.5;dep.style.cssText="width:55px;";
    dep.addEventListener("input",()=>{ADEPTH[band]=parseFloat(dep.value);});
    row.append(lbl,sel,dep);audioBands.appendChild(row);
  });
  document.getElementById("btnPin").addEventListener("click",_pinFav);
  document.getElementById("exportFavs").addEventListener("click",()=>{const txt=JSON.stringify(_favs);if(navigator.clipboard)navigator.clipboard.writeText(txt).then(()=>{},()=>prompt("favorites:",txt));else prompt("favorites:",txt);});
  document.getElementById("clearFavs").addEventListener("click",()=>{if(confirm("clear all favorites?")){_favs=[];_saveFavs();_renderFavs();}});
}

function setup() {
  const stage = document.getElementById("stage");
  const c = createCanvas(stage.clientWidth, stage.clientHeight, WEBGL);
  c.parent(stage);
  _pCanvas = c.elt;

  theShader = createShader(
    document.getElementById("vert").textContent,
    document.getElementById("frag").textContent
  );

  t0 = millis();

  const tSel = document.getElementById("themeSelect");
  THEME_NAMES.forEach(n=>{ const o=document.createElement("option"); o.value=n; o.textContent=n; tSel.appendChild(o); });
  tSel.addEventListener("change", e=>applyTheme(e.target.value));

  const paramCfg = [
    {id:"sScale",  vid:"vScale",  key:"scale"},
    {id:"sThresh", vid:"vThresh", key:"thresh"},
    {id:"sPhase",  vid:"vPhase",  key:"phase"},
    {id:"sSpin",   vid:"vSpin",   key:"spin"},
    {id:"sDist",   vid:"vDist",   key:"dist"},
    {id:"sElev",   vid:"vElev",   key:"elev"},
    {id:"sAO",     vid:"vAO",     key:"ao"},
  ];
  paramCfg.forEach(cfg=>{
    const el = document.getElementById(cfg.id);
    el.addEventListener("input", ()=>{
      P[cfg.key] = parseFloat(el.value);
      document.getElementById(cfg.vid).textContent = P[cfg.key].toFixed(2);
    });
    el.addEventListener("dblclick", ()=>{
      const def=parseFloat(el.defaultValue); P[cfg.key]=def; el.value=def;
      document.getElementById(cfg.vid).textContent = def.toFixed(2);
    });
  });

  document.getElementById("bgColor").addEventListener("input",   e=>{ cs.bg   = e.target.value; });
  document.getElementById("formColor").addEventListener("input",  e=>{ cs.form = e.target.value; });
  document.getElementById("hiColor").addEventListener("input",    e=>{ cs.hi   = e.target.value; });
  document.getElementById("sBgVal").addEventListener("input",     e=>{ cs.bgVal=parseFloat(e.target.value); document.getElementById("vBgVal").textContent=cs.bgVal.toFixed(2); });
  document.getElementById("sFormSat").addEventListener("input",   e=>{ cs.fSat =parseFloat(e.target.value); document.getElementById("vFormSat").textContent=cs.fSat.toFixed(2); });
  document.getElementById("sFormVal").addEventListener("input",   e=>{ cs.fVal =parseFloat(e.target.value); document.getElementById("vFormVal").textContent=cs.fVal.toFixed(2); });
  document.getElementById("sRim").addEventListener("input",       e=>{ cs.rim  =parseFloat(e.target.value); document.getElementById("vRim").textContent=cs.rim.toFixed(2); });

  document.getElementById("sPal").addEventListener("input", e=>{
    const idx = parseInt(e.target.value);
    document.getElementById("vPal").textContent = `${idx} ${PALETTES[idx][0]}`;
    applyPalette(idx);
    activeTheme = PALETTES[idx][0];
    const sel = document.getElementById("themeSelect");
    if(idx < THEME_NAMES.length && sel) sel.value = PALETTES[idx][0];
  });

  const starterSel = document.getElementById("starterPreset");
  STARTERS.forEach((s,i)=>{ const o=document.createElement("option"); o.value=i; o.textContent=s.name; starterSel.appendChild(o); });
  document.getElementById("btnLoad").addEventListener("click", ()=>{
    loadStarter(STARTERS[parseInt(starterSel.value)]);
  });

  document.getElementById("btnSave").addEventListener("click", ()=>{
    saveCanvas(`noixzy_${PIECE}_${Math.floor(millis())}`, "png");
  });

  document.getElementById("btnPause").addEventListener("click", ()=>{
    paused = !paused;
    if(paused) pauseT = millis() - t0;
    else t0 = millis() - pauseT;
    document.getElementById("btnPause").textContent = paused ? "play" : "pause";
  });

  document.addEventListener("keydown", e=>{
    if(e.key === "h") document.getElementById("panel").classList.toggle("hidden");
    if(e.key === " "){ e.preventDefault(); document.getElementById("btnPause").click(); }
    if(e.key === "[") cycleTheme(-1);
    if(e.key === "]") cycleTheme(1);
    if(e.key === "s") document.getElementById("btnSave").click();
  });

  const saved = localStorage.getItem(THEMEKEY);
  if(saved && THEME_NAMES.includes(saved)) applyTheme(saved);
  else applyTheme("graphite");

  syncParamUI();
  syncColorUI();
  document.getElementById("vPal").textContent = `${document.getElementById("sPal").value} ${PALETTES[parseInt(document.getElementById("sPal").value)][0]}`;

  _buildAudioUI();
  _loadFavs();
  _initOrbit(stage);
  buildNav();

  window.addEventListener("resize", ()=>{
    resizeCanvas(stage.clientWidth, stage.clientHeight);
  });
}

function draw() {
  if(paused) return;
  _audioApply();
  const t = (millis() - t0) / 1000.0;

  shader(theShader);
  theShader.setUniform("u_res",       [width, height]);
  theShader.setUniform("u_time",      t);
  theShader.setUniform("u_azimuth",   _camAzimuth);
  theShader.setUniform("u_scale",     P.scale);
  theShader.setUniform("u_threshold", P.thresh);
  theShader.setUniform("u_phase",     P.phase);
  theShader.setUniform("u_spin",      P.spin);
  theShader.setUniform("u_dist",      P.dist);
  theShader.setUniform("u_elev",      P.elev);
  theShader.setUniform("u_ao",        P.ao);
  theShader.setUniform("u_bgColor",   hexToRGB(cs.bg));
  theShader.setUniform("u_formColor", hexToRGB(cs.form));
  theShader.setUniform("u_hiColor",   hexToRGB(cs.hi));
  theShader.setUniform("u_bgValue",   cs.bgVal);
  theShader.setUniform("u_formSat",   cs.fSat);
  theShader.setUniform("u_formValue", cs.fVal);
  theShader.setUniform("u_rim",       cs.rim);
  noStroke();
  quad(-1,-1, 1,-1, 1,1, -1,1);
  _audioRestore();
}
const ALL_MODULES=[
  {id:"grid_extrude",title:"grid extrude"},{id:"sdf_raymarch",title:"sdf raymarch"},
  {id:"gyroid",title:"gyroid"},{id:"displacement",title:"displacement"},
  {id:"displacement_primitives",title:"displacement primitives"},
  {id:"mandelbulb",title:"mandelbulb"},{id:"fold",title:"fold"},
  {id:"flow_field",title:"flow field"},{id:"reaction_diffusion",title:"reaction diffusion"},
  {id:"voronoi",title:"voronoi"},{id:"contour_field",title:"contour field"},
  {id:"truchet",title:"truchet"},{id:"truchet_b",title:"truchet // color"},
  {id:"l_system",title:"l-system"},{id:"cellular_erosion",title:"cellular erosion"},
  {id:"recursive_grid",title:"recursive grid"},{id:"wave_interference",title:"wave interference"},
  {id:"stipple",title:"stipple"},
  {id:"hex_grid",title:"hex grid"},{id:"rose_curve",title:"rose curve"},
  {id:"lissajous_mesh",title:"lissajous mesh"},{id:"torus_knot",title:"torus knot"},
];
function buildNav(){
  const idx=ALL_MODULES.findIndex(m=>m.id===PIECE);
  if(idx<0) return;
  const prev=ALL_MODULES[(idx-1+ALL_MODULES.length)%ALL_MODULES.length];
  const next=ALL_MODULES[(idx+1)%ALL_MODULES.length];
  const np=document.getElementById("navPrev"); if(np){ np.href="../"+prev.id+"/noixzy_"+prev.id+".html"; np.title=prev.title; }
  const nn=document.getElementById("navNext"); if(nn){ nn.href="../"+next.id+"/noixzy_"+next.id+".html"; nn.title=next.title; }
  const strip=document.getElementById("moduleThumbStrip"); if(!strip) return;
  ALL_MODULES.forEach(m=>{
    const a=document.createElement("a"); a.href="../"+m.id+"/noixzy_"+m.id+".html"; a.title=m.title;
    a.className="navThumb"+(m.id===PIECE?" active":"");
    const img=document.createElement("img"); img.src="../gallery/thumbs/"+m.id+".png"; img.alt=m.title;
    a.appendChild(img); strip.appendChild(a);
  });
  setTimeout(()=>{ const el=strip.querySelector(".active"); if(el){const off=el.offsetLeft-strip.offsetWidth/2+el.offsetWidth/2;strip.scrollLeft=Math.max(0,off);} },50);
}
