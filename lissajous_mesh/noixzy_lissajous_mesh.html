<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>noixzy // lissajous mesh</title>
<link rel="icon" href="data:,">
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<style>
  :root { --bg:#0e0e10; --panel:#101316; --ink:#e8e8ea; --accent:#7fe0c2; --dim:#8b969c; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--ink); font:13px/1.4 ui-monospace,SFMono-Regular,Menlo,monospace; }
  .app { display:flex; flex-direction:row; align-items:stretch; height:calc(100vh - 28px); }
  .stage { position:relative; flex:1 1 auto; min-width:0; background:#000; }
  .stage canvas { display:block; width:100%; height:100%; }
  .panel { position:relative; width:300px; box-sizing:border-box; margin:14px; max-height:calc(100vh - 56px); overflow-y:auto;
           background:rgba(12,15,18,0.72); -webkit-backdrop-filter:blur(13px); backdrop-filter:blur(13px);
           border:1px solid rgba(127,224,194,0.20); padding:14px; border-radius:9px; box-shadow:0 10px 34px rgba(0,0,0,0.45); }
  .panel.hidden { opacity:0; pointer-events:none; }
  .panel h1 { font-size:13px; letter-spacing:.12em; text-transform:lowercase; margin:0 0 12px; color:var(--accent); }
  .row { margin:10px 0; padding:3px 0 5px 8px; border-left:2px solid transparent; }
  .row label { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:5px; opacity:.9; }
  input[type=range] { width:100%; height:28px; accent-color:var(--accent); }
  button { min-height:34px; background:#000; color:var(--ink); border:1px solid #333; padding:6px 10px; font:inherit; cursor:pointer; border-radius:4px; }
  button:hover { border-color:var(--accent); color:var(--accent); }
  .tools { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:12px 0; }
  .presetBox { margin-top:10px; padding-top:10px; border-top:1px solid rgba(127,224,194,0.18); }
  .presetLine { display:grid; grid-template-columns:1fr auto; gap:8px; margin-top:8px; }
  select { width:100%; margin-top:2px; min-height:34px; background:#000; color:var(--ink); border:1px solid #333; padding:5px 8px; font:inherit; border-radius:4px; }
  select:hover { border-color:var(--accent); }
  .hint { margin-top:8px; opacity:.4; font-size:11px; }
  .navBar { flex:0 0 28px; display:flex; align-items:center; justify-content:space-between; padding:0 12px; background:#0a0a0c; border-bottom:1px solid #1c1c1f; z-index:10; }
  .navBar a { color:var(--dim); text-decoration:none; font-size:11px; letter-spacing:.07em; padding:4px 6px; border-radius:3px; }
  .navBar a:hover { color:var(--accent); }
  .navCurrent { color:var(--accent) !important; }
  .moduleNav { margin-top:12px; padding-top:10px; border-top:1px solid #1e1e21; }
  .moduleNav .label { font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--dim); margin-bottom:6px; }
  .thumbRow { display:flex; gap:5px; overflow-x:auto; padding-bottom:4px; scrollbar-width:none; }
  .thumbRow::-webkit-scrollbar { display:none; }
  .navThumb { flex:0 0 auto; opacity:.55; transition:opacity .15s; }
  .navThumb:hover,.navThumb.active { opacity:1; }
  .navThumb img { width:46px; height:34px; object-fit:cover; border-radius:3px; border:1px solid #2a2a2d; display:block; }
  .navThumb.active img { border-color:var(--accent); }
</style>
</head>
<body>
<div class="navBar">
  <a id="navPrev" href="#">← prev</a>
  <a href="../gallery/index.html" class="navCurrent">⊞ gallery</a>
  <a id="navNext" href="#">next →</a>
</div>
<div class="app">
  <div id="stage" class="stage"></div>
  <div class="panel" id="panel">
    <h1>noixzy // lissajous mesh</h1>

    <div class="row" style="margin-bottom:10px">
      <label>theme</label>
      <select id="themeSelect" style="margin-top:2px"></select>
    </div>

    <div class="row"><label>freq a <span id="vA">—</span></label>
      <input id="sA" type="range" min="1" max="9" step="1" value="3"></div>
    <div class="row"><label>freq b <span id="vB">—</span></label>
      <input id="sB" type="range" min="1" max="9" step="1" value="2"></div>
    <div class="row"><label>curves <span id="vCurves">—</span></label>
      <input id="sCurves" type="range" min="4" max="48" step="2" value="20"></div>
    <div class="row"><label>speed <span id="vSpeed">—</span></label>
      <input id="sSpeed" type="range" min="0" max="1" step="0.01" value="0.25"></div>
    <div class="row"><label>trail <span id="vTrail">—</span></label>
      <input id="sTrail" type="range" min="0" max="1" step="0.01" value="0.62"></div>
    <div class="row"><label>thickness <span id="vThick">—</span></label>
      <input id="sThick" type="range" min="0" max="1" step="0.01" value="0.3"></div>
    <div class="row"><label>phase drift <span id="vDrift">—</span></label>
      <input id="sDrift" type="range" min="0" max="1" step="0.01" value="0.45"></div>

    <div class="tools">
      <button id="btnSave" type="button">save png</button>
      <button id="btnPause" type="button">pause</button>
    </div>

    <div class="presetBox">
      <div class="presetLine">
        <select id="starterPreset"></select>
        <button id="btnLoad" type="button">load</button>
      </div>
    </div>

    <div class="moduleNav">
      <div class="label">modules</div>
      <div class="thumbRow" id="moduleThumbStrip"></div>
    </div>
    <div class="hint">h hide · space pause · [ ] theme · s save</div>
  </div>
</div>
<script>
const PIECE="lissajous_mesh";
const THEMEKEY="noixzy_lab_theme";
const PALETTES=[
  ["ember",    "#0e0e10","#5a2400","#ed8a3a"],
  ["mineral",  "#071414","#0f403a","#7fe0c2"],
  ["violet",   "#100c18","#2c2660","#b7b0ff"],
  ["amber",    "#140d06","#5a3414","#f0c890"],
  ["graphite", "#0c0c0c","#3a3a3a","#f2f2f2"],
  ["cyan",     "#071018","#103f5a","#72d8ff"],
  ["acid",     "#0a1207","#2d4f13","#c7ff4a"],
  ["magenta",  "#16070e","#5a1232","#ff6aa6"],
  ["gold",     "#15100a","#6b4514","#ffe0a0"],
  ["neutral",  "#0f1115","#222b34","#b7c1ca"],
  ["copper",   "#140b0b","#612626","#ff9a7a"],
  ["ice",      "#090d18","#17305f","#9bc8ff"],
];
const THEME_NAMES=PALETTES.map(p=>p[0]);

const STARTERS=[
  {name:"teal weave 3:2",   pal:1, P:{a:3,b:2,curves:20,speed:0.25,trail:0.62,thick:0.3,drift:0.45}},
  {name:"violet knot 5:4",  pal:2, P:{a:5,b:4,curves:24,speed:0.18,trail:0.7, thick:0.25,drift:0.55}},
  {name:"ember braid 7:3",  pal:0, P:{a:7,b:3,curves:16,speed:0.32,trail:0.5, thick:0.4, drift:0.35}},
  {name:"acid grid 4:3",    pal:6, P:{a:4,b:3,curves:28,speed:0.22,trail:0.6, thick:0.2, drift:0.6}},
  {name:"cyan dense 5:3",   pal:5, P:{a:5,b:3,curves:36,speed:0.15,trail:0.75,thick:0.18,drift:0.7}},
  {name:"gold simple 2:1",  pal:8, P:{a:2,b:1,curves:12,speed:0.4, trail:0.45,thick:0.5, drift:0.3}},
];

function hexToRGB(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}

let bgCol=[7,20,20],fmCol=[15,64,58],hiCol=[127,224,194];
let activeTheme=null;
let P={a:3,b:2,curves:20,speed:0.25,trail:0.62,thick:0.3,drift:0.45};
let t0,paused=false,pauseT=0;
let pg;

const PARAMS=[
  {id:"sA",     vid:"vA",     key:"a",      fmt:v=>Math.round(v).toString()},
  {id:"sB",     vid:"vB",     key:"b",      fmt:v=>Math.round(v).toString()},
  {id:"sCurves",vid:"vCurves",key:"curves", fmt:v=>Math.round(v).toString()},
  {id:"sSpeed", vid:"vSpeed", key:"speed",  fmt:v=>v.toFixed(2)},
  {id:"sTrail", vid:"vTrail", key:"trail",  fmt:v=>v.toFixed(2)},
  {id:"sThick", vid:"vThick", key:"thick",  fmt:v=>v.toFixed(2)},
  {id:"sDrift", vid:"vDrift", key:"drift",  fmt:v=>v.toFixed(2)},
];

function applyTheme(name){
  const idx=THEME_NAMES.indexOf(name);if(idx<0)return;
  activeTheme=name;
  bgCol=hexToRGB(PALETTES[idx][1]);
  fmCol=hexToRGB(PALETTES[idx][2]);
  hiCol=hexToRGB(PALETTES[idx][3]);
  if(pg){pg.background(bgCol[0],bgCol[1],bgCol[2]);}
  const sel=document.getElementById("themeSelect");if(sel)sel.value=name;
  try{localStorage.setItem(THEMEKEY,name);}catch(e){}
}
function cycleTheme(dir){
  const idx=THEME_NAMES.indexOf(activeTheme);
  applyTheme(THEME_NAMES[((idx<0?0:idx)+dir+THEME_NAMES.length)%THEME_NAMES.length]);
}
function loadStarter(s){
  Object.assign(P,s.P);applyTheme(PALETTES[s.pal][0]);syncUI();
}
function syncUI(){
  PARAMS.forEach(c=>{document.getElementById(c.id).value=P[c.key];document.getElementById(c.vid).textContent=c.fmt(P[c.key]);});
}

function setup(){
  const stage=document.getElementById("stage");
  const c=createCanvas(stage.clientWidth,stage.clientHeight);
  c.parent(stage);
  colorMode(RGB,255);
  pg=createGraphics(width,height);
  pg.colorMode(RGB,255);
  t0=millis();

  const tSel=document.getElementById("themeSelect");
  THEME_NAMES.forEach(n=>{const o=document.createElement("option");o.value=n;o.textContent=n;tSel.appendChild(o);});
  tSel.addEventListener("change",e=>applyTheme(e.target.value));

  PARAMS.forEach(cfg=>{
    const el=document.getElementById(cfg.id);
    el.addEventListener("input",()=>{P[cfg.key]=parseFloat(el.value);document.getElementById(cfg.vid).textContent=cfg.fmt(P[cfg.key]);});
  });

  const starterSel=document.getElementById("starterPreset");
  STARTERS.forEach((s,i)=>{const o=document.createElement("option");o.value=i;o.textContent=s.name;starterSel.appendChild(o);});
  document.getElementById("btnLoad").addEventListener("click",()=>loadStarter(STARTERS[parseInt(starterSel.value)]));
  document.getElementById("btnSave").addEventListener("click",()=>saveCanvas(`noixzy_${PIECE}_${Math.floor(millis())}`,"png"));
  document.getElementById("btnPause").addEventListener("click",()=>{
    paused=!paused;if(paused)pauseT=millis()-t0;else t0=millis()-pauseT;
    document.getElementById("btnPause").textContent=paused?"play":"pause";
  });
  document.addEventListener("keydown",e=>{
    if(e.key==="h")document.getElementById("panel").classList.toggle("hidden");
    if(e.key===" "){e.preventDefault();document.getElementById("btnPause").click();}
    if(e.key==="[")cycleTheme(-1);if(e.key==="]")cycleTheme(1);
    if(e.key==="s")document.getElementById("btnSave").click();
  });

  const saved=localStorage.getItem(THEMEKEY);
  if(saved&&THEME_NAMES.includes(saved))applyTheme(saved);else applyTheme("mineral");
  syncUI();buildNav();
  window.addEventListener("resize",()=>{resizeCanvas(stage.clientWidth,stage.clientHeight);pg=createGraphics(width,height);pg.colorMode(RGB,255);pg.background(bgCol[0],bgCol[1],bgCol[2]);});
}

function draw(){
  if(paused)return;
  const t=(millis()-t0)/1000;
  const fa=Math.round(P.a),fb=Math.round(P.b);
  const N=Math.round(P.curves);
  const spd=lerp(0.04,0.8,P.speed);
  const sw=lerp(0.3,3.5,P.thick);
  const trailAlpha=floor(lerp(200,12,P.trail));
  const driftSpd=lerp(0.01,0.3,P.drift);
  const steps=600;
  const rx=width*0.44,ry=height*0.44;

  // trail fade
  pg.noStroke();
  pg.fill(bgCol[0],bgCol[1],bgCol[2],trailAlpha);
  pg.rect(0,0,width,height);

  pg.push();
  pg.translate(width/2,height/2);
  pg.strokeWeight(sw);
  pg.noFill();

  for(let i=0;i<N;i++){
    const tf=i/N;
    const phase=tf*TWO_PI+t*driftSpd;
    const r=lerp(fmCol[0],hiCol[0],tf),g=lerp(fmCol[1],hiCol[1],tf),b=lerp(fmCol[2],hiCol[2],tf);
    const alpha=floor(lerp(40,180,pow(tf,0.6)));
    pg.stroke(r,g,b,alpha);
    pg.beginShape();
    for(let j=0;j<=steps;j++){
      const theta=(j/steps)*TWO_PI;
      const x=rx*sin(fa*theta+phase+t*spd);
      const y=ry*sin(fb*theta+t*spd*0.7);
      pg.vertex(x,y);
    }
    pg.endShape();
  }
  pg.pop();
  image(pg,0,0);
}

const ALL_MODULES=[
  {id:"grid_extrude",title:"grid extrude"},{id:"sdf_raymarch",title:"sdf raymarch"},
  {id:"gyroid",title:"gyroid"},{id:"displacement",title:"displacement"},
  {id:"displacement_primitives",title:"displacement primitives"},
  {id:"mandelbulb",title:"mandelbulb"},{id:"fold",title:"fold"},
  {id:"flow_field",title:"flow field"},{id:"reaction_diffusion",title:"reaction diffusion"},
  {id:"voronoi",title:"voronoi"},{id:"contour_field",title:"contour field"},
  {id:"truchet",title:"truchet"},{id:"truchet_b",title:"truchet // color"},
  {id:"l_system",title:"l-system"},{id:"cellular_erosion",title:"cellular erosion"},
  {id:"recursive_grid",title:"recursive grid"},{id:"wave_interference",title:"wave interference"},
  {id:"stipple",title:"stipple"},
  {id:"hex_grid",title:"hex grid"},{id:"rose_curve",title:"rose curve"},
  {id:"lissajous_mesh",title:"lissajous mesh"},{id:"torus_knot",title:"torus knot"},
];
function buildNav(){
  const idx=ALL_MODULES.findIndex(m=>m.id===PIECE);if(idx<0)return;
  const prev=ALL_MODULES[(idx-1+ALL_MODULES.length)%ALL_MODULES.length];
  const next=ALL_MODULES[(idx+1)%ALL_MODULES.length];
  const np=document.getElementById("navPrev");if(np){np.href="../"+prev.id+"/noixzy_"+prev.id+".html";np.title=prev.title;}
  const nn=document.getElementById("navNext");if(nn){nn.href="../"+next.id+"/noixzy_"+next.id+".html";nn.title=next.title;}
  const strip=document.getElementById("moduleThumbStrip");if(!strip)return;
  ALL_MODULES.forEach(m=>{
    const a=document.createElement("a");a.href="../"+m.id+"/noixzy_"+m.id+".html";a.title=m.title;
    a.className="navThumb"+(m.id===PIECE?" active":"");
    const img=document.createElement("img");img.src="../gallery/thumbs/"+m.id+".png";img.alt=m.title;
    a.appendChild(img);strip.appendChild(a);
  });
  setTimeout(()=>{const el=strip.querySelector(".active");if(el){const off=el.offsetLeft-strip.offsetWidth/2+el.offsetWidth/2;strip.scrollLeft=Math.max(0,off);}},50);
}
</script>
</body>
</html>
