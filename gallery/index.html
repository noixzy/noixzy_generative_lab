<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>noixzy // generative lab</title>
<style>
  :root { --bg:#0e0e10; --panel:#1a1a1d; --ink:#e8e8ea; --accent:#b7ff2a; --dim:#7a7a7e; }
  html,body { margin:0; background:var(--bg); color:var(--ink);
    font:13px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace; }
  header { padding:28px 28px 10px; }
  h1 { margin:0; font-size:15px; letter-spacing:.16em; text-transform:lowercase; color:var(--accent); }
  .sub { color:var(--dim); margin-top:6px; max-width:620px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
    gap:14px; padding:18px 28px 40px; }
  a.card { display:block; text-decoration:none; color:var(--ink);
    background:var(--panel); border:1px solid #222; border-radius:8px; overflow:hidden; }
  a.card:hover { border-color:#ffffff; }
  .thumb { aspect-ratio:1/1; background:#000; position:relative; overflow:hidden; }
  .thumb img { width:100%; height:100%; object-fit:cover; display:block; }
  .meta { padding:11px 13px; }
  .name { color:var(--accent); text-transform:lowercase; letter-spacing:.06em; }
  .desc { color:var(--dim); margin-top:4px; font-size:12px; }
  .tag { display:inline-block; margin-top:8px; padding:2px 7px; border:1px solid #333;
    border-radius:3px; color:var(--dim); font-size:11px; }
  .badge { position:absolute; top:8px; right:8px; padding:2px 6px;
    border-radius:3px; font-size:10px; letter-spacing:.07em; line-height:1.4; }
  .badge-h { background:transparent; border:1px solid rgba(255,255,255,.65);
    color:#b7ff2a; }
  .badge-e { background:rgba(183,255,42,.14); border:1px solid #b7ff2a;
    color:#fff; }
</style>
</head>
<body>
<header>
  <h1>noixzy // generative lab</h1>
  <div class="sub">small algorithmic experiments. each is one self-contained file —
    seed on canvas, four sliders, png export. feed them into blender, music visuals,
    stills, or textures.</div>
</header>
<div class="grid" id="grid"></div>
<script>
const pieces=[
  ["grid_extrude","grid extrude","2.5D extruded blocks · stacked param layers","loop / still / scene","h"],
  ["sdf_raymarch","sdf raymarch","metaball field, smooth booleans, orbit loop","loop / still","h"],
  ["gyroid","gyroid","TPMS shell SDF · animated phase orbit","loop / still","h"],
  ["displacement","displacement sphere","noise-displaced sphere · fbm breathing surface","loop / still","h"],
  ["displacement_primitives","displacement primitives","branched displacement module · primitive type tests","loop / shape / displacement","h"],
  ["mandelbulb","mandelbulb","power-8 fractal DE · orbit trap coloring · morph","loop / still","h"],
  ["fold","fold","kaleidoscopic IFS · menger-style space folding","loop / still","h"],
  ["metafluid","metafluid","smooth-min SDF metaballs · animated blob merging · viscous fluid","loop / still","h"],
  ["moire_field","moire field","interference bands · animated warped line field","loop / texture / graphic","e"],
  ["particle_orbitals","particle orbitals","orbiting points and trails around attractor wells","loop / motion / particles","e"],
  ["radial_noise","radial noise","radial rings and spoke-noise field · circular interference","loop / texture / radial","e"],
  ["kaleidoscope_field","kaleidoscope field","mirrored wedge field · folded circular pattern system","loop / texture / symmetry","e"],
  ["topographic_rings","topographic rings","contour-ring elevation fields · topographic relief","loop / texture / relief","e"],
  ["ribbon_flow","ribbon flow","spline ribbon trails · layered motion-graphic curves","loop / motion / ribbon","e"],
  ["glyph_field","glyph field","procedural symbols and noisy typography-like marks","still / texture / glyphs","e"],
  ["crystal_growth","crystal growth","branching crystalline structures · faceted growth marks","loop / structure / relief","e"],
  ["vector_scope","vector scope","oscilloscope-style lissajous traces and glowing vector paths","loop / motion / signal","e"],
  ["wave_lattice","wave lattice","crossed wave grids · animated interference lattice","loop / texture / grid","e"],
  ["fractal_tiles","fractal tiles","recursive tile fields · folded geometric mosaic texture","loop / texture / pattern","e"],
  ["plasma_membrane","plasma membrane","soft cellular plasma field · organic membrane relief","loop / organic / relief","e"],
  ["interference_grid","interference grid","cross-wave grid field · phase-bent interference mesh","loop / texture / grid","e"],
  ["cellular_bloom","cellular bloom","glowing organic cells · blooming soft particle field","loop / organic / glow","e"],
  ["vortex_sheet","vortex sheet","curling sheet streams · layered vortex flow ribbons","loop / motion / flow","e"],
  ["prism_moire","prism moire","angled prism-line interference · split moire refraction","loop / texture / prism","e"],
  ["terrain_slice","terrain slice","stacked elevation slices · animated strata contour sheet","loop / relief / terrain","e"],
  ["flow_field","flow field","noise-advected particles leaving trails","still / loop","e"],
  ["reaction_diffusion","reaction diffusion","gray-scott organic spots & tendrils","texture / displacement","e"],
  ["voronoi","voronoi","relaxed cell field, edge↔fill","scaffold / texture","e"],
  ["contour_field","contour field","marching-squares isolines over noise","still / loop","e"],
  ["truchet","truchet","flipped arc tiles → flowing curves","tileable texture","e"],
  ["truchet_b","truchet // color","arc tiles · noise-gradated color field · round cap","still / loop","e"],
  ["l_system","l-system","stochastic turtle branching","asset / overlay","e"],
  ["cellular_erosion","cellular erosion","CA-smoothed worn surface depth","displacement + roughness","e"],
  ["recursive_grid","recursive grid","noise-thresholded quad subdivision","layout / structure","e"],
  ["wave_interference","wave interference","multi-source ripple field · moiré zones · interference rings","still / loop / texture","e"],
  ["stipple","stipple","rejection-sampled dot field · luminance-driven density · breathing dots","still / texture","e"],
  ["hex_grid","hex grid","noise-pulsed hexagonal tiling · wave ripple glow","loop / texture","h"],
  ["rose_curve","rose curve","animated polar rose r=cos(n/d·θ) · layered phase mesh","loop / still","h"],
  ["lissajous_mesh","lissajous mesh","frequency-ratio Lissajous curves · woven phase drift","loop / still","h"],
  ["torus_knot","torus knot","p:q parametric torus knot SDF · raymarched tube · orbit drag","loop / still","h"],
];
const g=document.getElementById("grid");
for(const [dir,name,desc,tag,type] of pieces){
  const a=document.createElement("a");
  a.className="card"; a.href=`../${dir}/noixzy_${dir}.html`;
  const badgeCls=type==="h"?"badge badge-h":"badge badge-e";
  const badgeTxt=type==="h"?"✦ authored":"◎ generated";
  a.innerHTML=`<div class="thumb"><img src="thumbs/${dir}.png" alt="${name}">
      <span class="${badgeCls}">${badgeTxt}</span></div>
    <div class="meta"><div class="name">${name}</div>
    <div class="desc">${desc}</div><span class="tag">${tag}</span></div>`;
  g.appendChild(a);
}
</script>
</body>
</html>
