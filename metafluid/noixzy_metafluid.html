<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>noixzy // metafluid</title>
<link rel="icon" href="data:,">
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<style>
  :root { --bg:#0e0e10; --panel:#101316; --ink:#e8e8ea; --accent:#48dfff; --lime:#b7ff3c; --dim:#8b969c; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--ink); font:13px/1.4 ui-monospace,SFMono-Regular,Menlo,monospace; }
  .app { display:flex; flex-direction:row; align-items:stretch; height:calc(100vh - 28px); }
  .stage { position:relative; flex:1 1 auto; min-width:0; background:#000; }
  .stage canvas { display:block; width:100%; height:100%; }
  .stageFavs {
    position:absolute; left:50%; bottom:64px; transform:translateX(-50%);
    z-index:22; display:flex; justify-content:center; align-items:center;
    flex-wrap:wrap; gap:8px; max-width:min(760px,68vw);
    pointer-events:auto;
  }
  .stageFavs:empty { display:none; }
  .stageFavs .chip { margin:0; }
  .chip .x { opacity:.55; margin-left:5px; font-size:10px; }
  .chip .x:hover { opacity:1; }
  .stageTools {
    position:absolute; left:50%; bottom:14px; transform:translateX(-50%);
    z-index:21; display:flex; align-items:center; gap:14px;
    padding:8px 10px; border-radius:12px;
    background:rgba(0,0,0,0.50); border:1px solid rgba(72,223,255,0.24);
    -webkit-backdrop-filter:blur(12px); backdrop-filter:blur(12px);
    box-shadow:0 10px 30px rgba(0,0,0,0.35);
  }
  .stageToolGroup { display:flex; align-items:center; gap:6px; }
  .stageTools button, .stageTools select {
    min-height:32px; background:rgba(0,0,0,0.50); border-color:rgba(255,255,255,0.16);
    padding:5px 9px; margin:0; white-space:nowrap;
  }
  .stageTools select { width:auto; min-width:58px; }
  .stageThumbs { pointer-events:auto;
    position:absolute; left:14px; top:50%; transform:translateY(-50%); z-index:20;
    width:70px; max-height:min(640px,74vh);
    padding:8px; border-radius:12px;
    background:rgba(0,0,0,0.50); border:1px solid rgba(72,223,255,0.18);
    -webkit-backdrop-filter:blur(10px); backdrop-filter:blur(10px);
    opacity:.45; transition:opacity .22s ease;
    display:flex; flex-direction:column; gap:6px;
  }
  .stageThumbs:hover { opacity:1; }
  .stageThumbs .label { font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--dim); margin-bottom:2px; }
  .thumbScrollBtn { border:1px solid color-mix(in srgb, var(--accent) 45%, #333); background:rgba(0,0,0,.46); color:var(--accent); border-radius:5px; height:22px; cursor:pointer; }
  .thumbScrollBtn:hover { border-color:var(--accent); box-shadow:0 0 0 1px color-mix(in srgb, var(--accent) 45%, transparent); }
  .panel { position:relative; width:316px; min-width:300px; max-width:min(420px,44vw); box-sizing:border-box; margin:14px; max-height:calc(100vh - 56px); overflow-y:auto;
           background:rgba(12,15,18,0.72); -webkit-backdrop-filter:blur(13px); backdrop-filter:blur(13px);
           border:1px solid rgba(72,223,255,0.20); padding:14px; border-radius:9px; box-shadow:0 10px 34px rgba(0,0,0,0.45); }
  .panel.hidden { opacity:0; pointer-events:none; }
  .panel h1 { font-size:13px; letter-spacing:.12em; text-transform:lowercase; margin:0 0 12px; color:var(--accent); }
  .row { margin:11px 0; padding:3px 0 5px 8px; border-left:2px solid transparent; }
  .row label { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:5px; opacity:.9; }
  input[type=range] { width:100%; height:30px; accent-color:var(--accent); }
  .colorRow { display:grid; grid-template-columns:1fr 48px; gap:10px; align-items:end; }
  input[type=color] { width:48px; height:36px; padding:0; border:1px solid #333; border-radius:4px; background:#000; cursor:pointer; }
  input[type=color]:hover { border-color:var(--accent); }
  input[type=number], input[type=text], select { box-sizing:border-box; min-height:36px; background:#000; color:var(--ink); border:1px solid #333; padding:7px 8px; font:inherit; border-radius:4px; }
  button { min-height:36px; background:#000; color:var(--ink); border:1px solid #333; padding:7px 10px; font:inherit; cursor:pointer; border-radius:4px; }
  button:hover { border-color:var(--accent); color:var(--accent); }
  .tools { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:14px 0; }
  .presetBox { margin-top:12px; padding-top:12px; border-top:1px solid rgba(72,223,255,0.18); }
  .presetLine { display:grid; grid-template-columns:1fr auto; gap:8px; margin-top:8px; }
.presetLine.triple { grid-template-columns:1fr auto auto; }
  .cycleLine { display:grid; grid-template-columns:36px minmax(0,1fr) 36px; gap:8px; align-items:center; margin-top:8px; }
  .cycleLine select { width:100%; margin:0; }
  .cycleBtn { min-width:36px; padding-left:0; padding-right:0; }
.consoleBtns { display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
  .consoleBtns button { flex:1 1 calc(33.333% - 8px); min-width:82px; }
.presetStatus { margin-top:8px; min-height:16px; color:var(--dim); font-size:11px; letter-spacing:.04em; }
  select { width:100%; margin-top:2px; }
  select:hover { border-color:var(--accent); }
  .hint { margin-top:8px; opacity:.4; font-size:11px; }
  @media (max-width:900px){ .app{flex-direction:column;} .panel{width:100%; margin:0; max-height:40vh;} .stage{height:calc(100vh - 40vh);} }
  .navBar { flex:0 0 28px; display:flex; align-items:center; justify-content:space-between; padding:0 12px; background:#0a0a0c; border-bottom:1px solid #1c1c1f; z-index:10; }
  .navBar a { color:var(--dim); text-decoration:none; font-size:11px; letter-spacing:.07em; padding:4px 6px; border-radius:3px; }
  .navBar a:hover { color:var(--accent); }
  .navCurrent { color:var(--accent) !important; }
  .thumbRow {
    display:flex; flex-direction:column; gap:6px;
    max-height:min(500px,58vh); overflow-y:auto; overflow-x:hidden;
    padding:0; scrollbar-width:none;
  }
  .thumbRow::-webkit-scrollbar { display:none; }
  .navThumb { flex:0 0 auto; opacity:.55; transition:opacity .15s; }
  .navThumb:hover,.navThumb.active,.navThumb.selected { opacity:1; }
  .navThumb img { width:50px; height:38px; object-fit:cover; border-radius:4px; border:1px solid #2a2a2d; display:block; }
  .navThumb.active img { border-color:#fff; box-shadow:0 0 0 1px rgba(255,255,255,0.55); }
  .navThumb.selected img { border-color:var(--accent); box-shadow:0 0 0 1px color-mix(in srgb, var(--accent) 55%, transparent); }
    .seedLabel { display:block; line-height:1.12; }
.seedRead { display:block; margin-top:4px; color:var(--dim); font-size:10px; line-height:1; letter-spacing:.08em; }
</style>
</head>

    <div class="row"><label>viscosity <span id="vSmooth">—</span></label>

      <input id="sSpread" type="range" min="0" max="1" step="0.01" value="0.58"></div>
    <div class="row"><label>spin <span id="vSpin">—</span></label>

    <div class="row"><label>elevation <span id="vElev">—</span></label>

      <input id="sFormSat" type="range" min="0" max="2" step="0.01" value="1"></div>
    <div class="row"><label>form value <span id="vFormVal">—</span></label>
      <input id="sFormVal" type="range" min="0" max="2" step="0.01" value="1"></div>
    <div class="row"><label>rim strength <span id="vRim">—</span></label>
      <input id="sRim" type="range" min="0" max="2" step="0.01" value="1"></div>
<div id="audioPanel" style="display:none;margin-top:10px;padding:8px;background:#0a0a0a;border-radius:6px;font-size:12px;">

        drop audio file &nbsp;·&nbsp; <span style="color:var(--accent);">click to browse</span>

<script id="vert" type="x-shader/x-vertex">
attribute vec3 aPosition;
varying vec2 vUv;
void main(){
  vUv = aPosition.xy;
  gl_Position = vec4(aPosition.xy, 0.0, 1.0);
}
</script>

<script id="frag" type="x-shader/x-fragment">
precision highp float;
varying vec2 vUv;

uniform vec2  u_res;
uniform float u_time;
uniform float u_azimuth;
uniform float u_count;
uniform float u_seed;
uniform float u_radius;
uniform float u_smooth;
uniform float u_speed;
uniform float u_spread;
uniform float u_spin;
uniform float u_dist;
uniform float u_elev;
uniform float u_ao;
uniform vec3  u_bgColor;
uniform vec3  u_formColor;
uniform vec3  u_hiColor;
uniform float u_bgValue;
uniform float u_formSat;
uniform float u_formValue;
uniform float u_rim;

float smin(float a, float b, float k) {
  float h = clamp(0.5 + 0.5*(b-a)/k, 0.0, 1.0);
  return mix(b, a, h) - k*h*(1.0-h);
}

float sdSphere(vec3 p, float r) { return length(p) - r; }

float map(vec3 p) {
  float rad = mix(0.15, 0.58, u_radius);
  float k   = mix(0.05, 0.65, u_smooth);
  float t   = u_time * mix(0.06, 0.9, u_speed);
  float spr = mix(0.45, 1.85, u_spread);
  float seedPhase = u_seed * 0.013;
  t += seedPhase;

  vec3 p0 = spr * vec3(sin(t*1.00)*1.00, cos(t*0.70)*0.85, sin(t*0.90)*0.75);
  vec3 p1 = spr * vec3(cos(t*0.85)*0.90, sin(t*1.20)*1.00, cos(t*1.10)*0.80);
  vec3 p2 = spr * vec3(sin(t*1.30+2.10)*0.80, cos(t*0.60+1.20)*0.90, sin(t*0.80+0.50)*0.90);
  vec3 p3 = spr * vec3(cos(t*0.90+3.50)*1.00, sin(t*1.10+0.70)*0.75, cos(t*0.75+1.80)*0.90);
  vec3 p4 = spr * vec3(sin(t*0.70+1.00)*0.85, cos(t*1.40+0.30)*0.95, sin(t*1.20+2.40)*0.70);
  vec3 p5 = spr * vec3(cos(t*1.10+2.00)*0.90, sin(t*0.80+3.10)*0.85, cos(t*1.40+0.90)*0.80);
  vec3 p6 = spr * vec3(sin(t*0.50+0.50)*1.10, cos(t*1.00+2.20)*0.70, sin(t*1.30+1.30)*0.65);
  vec3 p7  = spr * vec3(cos(t*1.30+1.50)*0.80, sin(t*0.60+0.80)*1.00, cos(t*0.95+2.50)*0.90);
  vec3 p8  = spr * vec3(sin(t*1.55+0.40)*0.72, cos(t*0.95+2.80)*0.92, sin(t*0.65+1.70)*0.82);
  vec3 p9  = spr * vec3(cos(t*0.72+2.60)*1.05, sin(t*1.65+1.10)*0.62, cos(t*1.18+0.20)*0.72);
  vec3 p10 = spr * vec3(sin(t*1.90+3.20)*0.66, cos(t*0.54+0.90)*1.05, sin(t*1.45+2.20)*0.66);
  vec3 p11 = spr * vec3(cos(t*1.42+0.70)*0.94, sin(t*0.88+3.70)*0.76, cos(t*0.58+1.40)*1.02);
  vec3 p12 = spr * vec3(sin(t*0.82+2.90)*1.08, cos(t*1.72+0.60)*0.58, sin(t*1.05+3.60)*0.78);
  vec3 p13 = spr * vec3(cos(t*1.78+1.90)*0.70, sin(t*0.76+2.40)*1.02, cos(t*1.34+3.00)*0.64);
  vec3 p14 = spr * vec3(sin(t*1.12+4.10)*0.86, cos(t*1.28+1.60)*0.74, sin(t*0.48+2.70)*1.06);
  vec3 p15 = spr * vec3(cos(t*0.62+3.30)*1.14, sin(t*1.92+0.20)*0.54, cos(t*1.58+2.10)*0.68);
  vec3 p16 = spr * vec3(sin(t*1.37+5.10)*0.74, cos(t*0.91+4.20)*1.12, sin(t*1.66+0.40)*0.58);
  vec3 p17 = spr * vec3(cos(t*1.83+2.80)*1.02, sin(t*0.67+5.70)*0.62, cos(t*1.21+4.90)*0.86);
  vec3 p18 = spr * vec3(sin(t*0.73+6.40)*1.18, cos(t*1.51+2.30)*0.50, sin(t*0.94+5.20)*0.92);
  vec3 p19 = spr * vec3(cos(t*1.26+4.40)*0.60, sin(t*1.74+1.10)*1.06, cos(t*0.82+3.70)*0.72);
  vec3 p20 = spr * vec3(sin(t*1.98+0.30)*0.96, cos(t*0.44+5.80)*0.68, sin(t*1.31+4.50)*1.10);
  vec3 p21 = spr * vec3(cos(t*0.58+6.10)*1.22, sin(t*1.39+2.60)*0.48, cos(t*1.87+1.30)*0.76);
  vec3 p22 = spr * vec3(sin(t*1.62+3.90)*0.68, cos(t*1.07+0.80)*1.18, sin(t*0.69+6.00)*0.84);
  vec3 p23 = spr * vec3(cos(t*1.09+5.40)*0.88, sin(t*0.96+3.20)*0.94, cos(t*1.48+2.00)*1.04);
  vec3 p24 = spr * vec3(sin(t*0.52+1.70)*1.08, cos(t*1.84+4.80)*0.56, sin(t*1.16+2.90)*0.70);
  vec3 p25 = spr * vec3(cos(t*1.71+0.60)*0.72, sin(t*0.49+6.30)*1.14, cos(t*0.77+5.10)*0.90);
  vec3 p26 = spr * vec3(sin(t*1.24+2.20)*0.92, cos(t*1.93+1.40)*0.80, sin(t*0.61+4.10)*1.16);
  vec3 p27 = spr * vec3(cos(t*0.88+3.60)*1.12, sin(t*1.58+5.00)*0.66, cos(t*1.19+0.90)*0.62);
  vec3 p28 = spr * vec3(sin(t*1.46+5.90)*0.54, cos(t*0.83+2.10)*1.20, sin(t*1.75+3.30)*0.96);
  vec3 p29 = spr * vec3(cos(t*1.34+1.50)*0.98, sin(t*1.02+4.60)*0.58, cos(t*0.53+6.20)*1.18);
  vec3 p30 = spr * vec3(sin(t*0.66+3.10)*1.24, cos(t*1.67+5.50)*0.72, sin(t*1.29+1.80)*0.52);
  vec3 p31 = spr * vec3(cos(t*1.91+4.70)*0.64, sin(t*0.74+0.50)*1.22, cos(t*1.43+3.90)*0.82);

  float d = sdSphere(p - p0, rad);
  d = smin(d, sdSphere(p - p1, rad * 0.93), k);
  d = smin(d, sdSphere(p - p2, (u_count >= 3.0) ? rad * 0.88 : 0.0001), k);
  d = smin(d, sdSphere(p - p3, (u_count >= 4.0) ? rad * 0.84 : 0.0001), k);
  d = smin(d, sdSphere(p - p4, (u_count >= 5.0) ? rad * 0.80 : 0.0001), k);
  d = smin(d, sdSphere(p - p5, (u_count >= 6.0) ? rad * 0.76 : 0.0001), k);
  d = smin(d, sdSphere(p - p6, (u_count >= 7.0) ? rad * 0.72 : 0.0001), k);
  d = smin(d, sdSphere(p - p7,  (u_count >= 8.0)  ? rad * 0.68 : 0.0001), k);
  d = smin(d, sdSphere(p - p8,  (u_count >= 9.0)  ? rad * 0.66 : 0.0001), k);
  d = smin(d, sdSphere(p - p9,  (u_count >= 10.0) ? rad * 0.64 : 0.0001), k);
  d = smin(d, sdSphere(p - p10, (u_count >= 11.0) ? rad * 0.62 : 0.0001), k);
  d = smin(d, sdSphere(p - p11, (u_count >= 12.0) ? rad * 0.60 : 0.0001), k);
  d = smin(d, sdSphere(p - p12, (u_count >= 13.0) ? rad * 0.58 : 0.0001), k);
  d = smin(d, sdSphere(p - p13, (u_count >= 14.0) ? rad * 0.56 : 0.0001), k);
  d = smin(d, sdSphere(p - p14, (u_count >= 15.0) ? rad * 0.54 : 0.0001), k);
  d = smin(d, sdSphere(p - p15, (u_count >= 16.0) ? rad * 0.52 : 0.0001), k);
  d = smin(d, sdSphere(p - p16, (u_count >= 17.0) ? rad * 0.50 : 0.0001), k);
  d = smin(d, sdSphere(p - p17, (u_count >= 18.0) ? rad * 0.49 : 0.0001), k);
  d = smin(d, sdSphere(p - p18, (u_count >= 19.0) ? rad * 0.48 : 0.0001), k);
  d = smin(d, sdSphere(p - p19, (u_count >= 20.0) ? rad * 0.47 : 0.0001), k);
  d = smin(d, sdSphere(p - p20, (u_count >= 21.0) ? rad * 0.46 : 0.0001), k);
  d = smin(d, sdSphere(p - p21, (u_count >= 22.0) ? rad * 0.45 : 0.0001), k);
  d = smin(d, sdSphere(p - p22, (u_count >= 23.0) ? rad * 0.44 : 0.0001), k);
  d = smin(d, sdSphere(p - p23, (u_count >= 24.0) ? rad * 0.43 : 0.0001), k);
  d = smin(d, sdSphere(p - p24, (u_count >= 25.0) ? rad * 0.42 : 0.0001), k);
  d = smin(d, sdSphere(p - p25, (u_count >= 26.0) ? rad * 0.41 : 0.0001), k);
  d = smin(d, sdSphere(p - p26, (u_count >= 27.0) ? rad * 0.40 : 0.0001), k);
  d = smin(d, sdSphere(p - p27, (u_count >= 28.0) ? rad * 0.39 : 0.0001), k);
  d = smin(d, sdSphere(p - p28, (u_count >= 29.0) ? rad * 0.38 : 0.0001), k);
  d = smin(d, sdSphere(p - p29, (u_count >= 30.0) ? rad * 0.37 : 0.0001), k);
  d = smin(d, sdSphere(p - p30, (u_count >= 31.0) ? rad * 0.36 : 0.0001), k);
  d = smin(d, sdSphere(p - p31, (u_count >= 32.0) ? rad * 0.35 : 0.0001), k);

  return d;
}

vec3 calcNormal(vec3 p) {
  vec2 e = vec2(0.002, 0.0);
  return normalize(vec3(
    map(p+e.xyy)-map(p-e.xyy),
    map(p+e.yxy)-map(p-e.yxy),
    map(p+e.yyx)-map(p-e.yyx)));
}

float calcAO(vec3 pos, vec3 nor) {
  float occ = 0.0, d;
  d=map(pos+nor*0.06); occ+=(0.06-d)*0.9;
  d=map(pos+nor*0.14); occ+=(0.14-d)*0.7;
  d=map(pos+nor*0.26); occ+=(0.26-d)*0.5;
  d=map(pos+nor*0.42); occ+=(0.42-d)*0.35;
  return clamp(1.0 - 1.6*occ, 0.0, 1.0);
}

void main() {
  vec2 uv = vUv;
  uv.x *= u_res.x / u_res.y;

  float a   = u_azimuth + u_time * u_spin * 0.35;
  vec3  ro  = vec3(sin(a)*u_dist, u_elev, cos(a)*u_dist);
  vec3  ta  = vec3(0.0);
  vec3  fw  = normalize(ta - ro);
  vec3  rt  = normalize(cross(vec3(0.0, 1.0, 0.0), fw));
  vec3  up  = cross(fw, rt);
  vec3  rd  = normalize(fw*1.85 + rt*uv.x + up*uv.y);

  float tt = 0.5;
  bool  hit = false;
  for(int i = 0; i < 90; i++) {
    float d = map(ro + rd * tt);
    if(d < 0.001) { hit = true; break; }
    if(tt > 16.0) break;
    tt += d * 0.65;
  }

  float y       = vUv.y * 0.5 + 0.5;
  vec3  bgBase  = max(u_bgColor * u_bgValue, vec3(0.0));
  vec3  bg      = mix(bgBase * 0.58, bgBase * 1.12, y);
  float bvig    = smoothstep(1.5, 0.0, length(vUv * 0.9));
  bg = mix(bg * 0.72, bg, bvig);
  vec3 col = bg;

  if(hit) {
    vec3  p   = ro + rd * tt;
    vec3  n   = calcNormal(p);
    float ao  = mix(1.0, calcAO(p, n), u_ao);

    vec3  ld   = normalize(vec3(0.55, 0.9, 0.45));
    float dif  = clamp(dot(n, ld)*0.5 + 0.5, 0.0, 1.0);
    float rim  = pow(clamp(1.0 - dot(n, -rd), 0.0, 1.0), 2.5);
    float spec = pow(clamp(dot(reflect(-ld, n), -rd), 0.0, 1.0), 32.0);
    float fres = pow(clamp(1.0 - dot(n, -rd), 0.0, 1.0), 4.0);
    float sss  = pow(max(0.0, dot(-rd, ld)), 2.0) * 0.28;

    float luma   = dot(u_formColor, vec3(0.2126, 0.7152, 0.0722));
    vec3  baseCol = mix(vec3(luma), u_formColor, u_formSat) * u_formValue;

    col  = baseCol * mix(0.42, 1.12, dif);
    col  = mix(col, u_hiColor * u_formValue, smoothstep(0.5, 0.9, dif) * 0.38 * u_rim);
    col += rim  * u_hiColor * 0.30 * u_rim;
    col += spec * u_hiColor * 0.22 * u_rim;
    col += fres * u_hiColor * 0.08 * u_rim;
    col += sss  * baseCol * 0.5;
    col *= ao;

    float fog = clamp((tt - 3.0) / 14.0, 0.0, 0.5);
    col = mix(col, bg, fog * 0.45);
  }

  float vig = smoothstep(1.45, 0.15, length(vUv));
  col *= mix(0.72, 1.0, vig);
  col  = pow(clamp(col, 0.0, 1.0), vec3(0.84));
  gl_FragColor = vec4(col, 1.0);
}
</script>

function clampV(v,a,b){ return Math.min(b,Math.max(a,v)); }

const _FAV_KEY = "noixzy_"+PIECE+"_favs";
function _audioApply(){
  _audioSaved={};
  if(!audioActive||!analyser) return;
  analyser.getByteFrequencyData(audioData);
  const N=audioData.length;
  const avg=(s,e)=>{let v=0;for(let i=s;i<e;i++)v+=audioData[i];return v/((e-s)*255);};
  ABANDS.bass=avg(0,4); ABANDS.mid=avg(4,20); ABANDS.high=avg(20,60); ABANDS.presence=avg(0,N);
  for(const band of['bass','mid','high','presence']){
    const k=AMAP[band]; if(!k||P[k]===undefined) continue;
    _audioSaved[k]=P[k];
    const par=_pAudioParams.find(p=>p.k===k);
    const mn=par?par.min:0, mx=par?par.max:1;
    P[k]=Math.min(mx,Math.max(mn,P[k]+ABANDS[band]*ADEPTH[band]*(mx-mn)));
  }
}
function _audioRestore(){ for(const k of Object.keys(_audioSaved)) P[k]=_audioSaved[k]; _audioSaved={}; }

  });
  document.getElementById("btnPin").addEventListener("click",_pinFav);
  document.getElementById("exportFavs").addEventListener("click",()=>{const txt=JSON.stringify(_favs);if(navigator.clipboard)navigator.clipboard.writeText(txt).then(()=>{},()=>prompt("favorites:",txt));else prompt("favorites:",txt);});
  document.getElementById("clearFavs").addEventListener("click",()=>{if(confirm("clear all favorites?")){_favs=[];_saveFavs();_renderFavs();}});
}

// Metafluid advanced console utilities
const META_PRESET_STORAGE_KEY = "noixzy_metafluid_presets_v1";
function _flashConsole(msg){
  const el=document.getElementById("presetStatus");
  if(el) el.textContent=msg;
}
function _flashBtn(id,msg,ms=900){
  const b=document.getElementById(id); if(!b) return;
  const old=b.textContent; b.textContent=msg;
  setTimeout(()=>b.textContent=old,ms);
}
function _mfState(){
  return {
    version:"metafluid_state_v1",
    P:{...P},
    cs:{...cs},
    activeTheme,
    seed:mfSeed,
    cam:_camAzimuth
  };
}
function _mfApplyState(s){
  if(!s) return;
  if(s.P) Object.assign(P,s.P);
  if(s.cs) Object.assign(cs,s.cs);
  if(Number.isFinite(s.seed)){ mfSeed=s.seed; _syncSeedUI(); }
  if(typeof s.cam==="number") _camAzimuth=s.cam;
  syncParamUI();
  syncColorUI();
  if(s.activeTheme && THEME_NAMES.includes(s.activeTheme)){
    activeTheme=s.activeTheme;
    const sel=document.getElementById("themeSelect"); if(sel) sel.value=s.activeTheme;
  }
}
function _readLocalPresets(){
  try{return JSON.parse(localStorage.getItem(META_PRESET_STORAGE_KEY)||"{}")||{};}
  catch(e){return {};}
}
function _writeLocalPresets(presets){
  localStorage.setItem(META_PRESET_STORAGE_KEY,JSON.stringify(presets));
}
function _renderLocalPresets(){
  const sel=document.getElementById("localPreset");
  if(!sel) return;
  const presets=_readLocalPresets();
  const names=Object.keys(presets).sort((a,b)=>a.localeCompare(b));
  sel.innerHTML="";
  if(!names.length){
    const o=document.createElement("option");
    o.value=""; o.textContent="no local presets";
    sel.appendChild(o);
    return;
  }
  names.forEach(n=>{
    const o=document.createElement("option");
    o.value=n; o.textContent=n;
    sel.appendChild(o);
  });
}
async function _copyMfState(){
  const payload=JSON.stringify(_mfState());
  try{ await navigator.clipboard.writeText(payload); _flashBtn("btnCopy","copied ✓"); }
  catch(e){ prompt("copy state",payload); }
}
async function _pasteMfState(){
  try{
    const raw=await navigator.clipboard.readText();
    _mfApplyState(JSON.parse(raw));
    _flashBtn("btnPaste","pasted ✓");
  }catch(e){ _flashBtn("btnPaste","paste ✗",1200); }
}
function _syncSeedUI(){ const el=document.getElementById("vSeed"); if(el) el.textContent=String(mfSeed); }
function _newMfSeed(){ mfSeed=Math.floor(Math.random()*1000000); _syncSeedUI(); _flashConsole("new seed "+mfSeed); }

function _resetMf(){
  location.reload();
}
function _saveMf2x(){
  const src=document.querySelector("canvas");
  if(!src) return _flashBtn("btnSave2x","no canvas",1200);
  const out=document.createElement("canvas");
  out.width=src.width*2;
  out.height=src.height*2;
  const ctx=out.getContext("2d");
  ctx.imageSmoothingEnabled=true;
  ctx.drawImage(src,0,0,out.width,out.height);
  const a=document.createElement("a");
  a.download=`noixzy_${PIECE}_${Math.floor(millis())}_2x.png`;
  a.href=out.toDataURL("image/png");
  a.click();
  _flashBtn("btnSave2x","saved ✓");
}
let _mfRecorder=null,_mfRecChunks=[];
function _recMf(){
  const btn=document.getElementById("btnRec");
  const src=document.querySelector("canvas");
  if(!src) return;
  if(_mfRecorder && _mfRecorder.state==="recording"){
    _mfRecorder.stop(); return;
  }
  const seconds=parseInt(document.getElementById("recDur")?.value||"4",10)||4;
  const stream=src.captureStream(30);
  _mfRecChunks=[];
  _mfRecorder=new MediaRecorder(stream,{mimeType:"video/webm"});
  _mfRecorder.ondataavailable=e=>{ if(e.data&&e.data.size) _mfRecChunks.push(e.data); };
  _mfRecorder.onstop=()=>{
    const blob=new Blob(_mfRecChunks,{type:"video/webm"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.download=`noixzy_${PIECE}_${Math.floor(millis())}_${seconds}s.webm`;
    a.href=url; a.click();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
    if(btn) btn.textContent="video";
  };
  _mfRecorder.start();
  if(btn) btn.textContent="stop";
  setTimeout(()=>{ if(_mfRecorder&&_mfRecorder.state==="recording") _mfRecorder.stop(); },seconds*1000);
}
function _rand(min,max,step=0.01){
  const v=min+Math.random()*(max-min);
  return step>=1?Math.round(v):+v.toFixed(3);
}
function _randomizeForm(){
  P.count=_rand(2,16,1);
  P.radius=_rand(0,1);
  P.smooth=_rand(0,1);
  P.speed=_rand(0,1);
  P.spread=_rand(0,1);
  P.spin=_rand(0,1);
  P.dist=_rand(3.5,8,0.05);
  P.elev=_rand(-1.5,2.5,0.05);
  P.ao=_rand(0,1);
  syncParamUI();
  _flashConsole("form randomized");
}
function _randomizeColor(){
  const idx=Math.floor(Math.random()*PALETTES.length);
  applyPalette(idx);
  document.getElementById("sPal").value=idx;
  document.getElementById("vPal").textContent=`${idx} ${PALETTES[idx][0]}`;
  cs.bgVal=_rand(0,2);
  cs.fSat=_rand(0,2);
  cs.fVal=_rand(0,2);
  cs.rim=_rand(0,2);
  syncColorUI();
  _flashConsole("color randomized");
}
function _randomizeUnlocked(){
  _randomizeForm();
  _randomizeColor();
  _flashConsole("unlocked randomized");
}
function _bindConsoleUtilities(){
  document.getElementById("btnReset")?.addEventListener("click",_resetMf);
  document.getElementById("btnNewSeed")?.addEventListener("click",_newMfSeed);
  _syncSeedUI();
  document.getElementById("btnCopy")?.addEventListener("click",_copyMfState);
  document.getElementById("btnPaste")?.addEventListener("click",_pasteMfState);
  document.getElementById("btnSave2x")?.addEventListener("click",_saveMf2x);
  document.getElementById("btnRec")?.addEventListener("click",_recMf);

  document.getElementById("randomUnlocked")?.addEventListener("click",_randomizeUnlocked);
  document.getElementById("randomForm")?.addEventListener("click",_randomizeForm);
  document.getElementById("randomColor")?.addEventListener("click",_randomizeColor);

  document.getElementById("savePreset")?.addEventListener("click",()=>{
    const name=(document.getElementById("presetName")?.value||"").trim();
    if(!name){ _flashConsole("name needed"); return; }
    const presets=_readLocalPresets();
    presets[name]=_mfState();
    _writeLocalPresets(presets);
    _renderLocalPresets();
    const sel=document.getElementById("localPreset"); if(sel) sel.value=name;
    _flashConsole("saved "+name);
  });
  document.getElementById("loadPreset")?.addEventListener("click",()=>{
    const name=document.getElementById("localPreset")?.value;
    const presets=_readLocalPresets();
    if(!name||!presets[name]){ _flashConsole("preset missing"); return; }
    _mfApplyState(presets[name]);
    _flashConsole("loaded "+name);
  });
  document.getElementById("deletePreset")?.addEventListener("click",()=>{
    const name=document.getElementById("localPreset")?.value;
    const presets=_readLocalPresets();
    if(!name||!presets[name]){ _flashConsole("preset missing"); return; }
    delete presets[name];
    _writeLocalPresets(presets);
    _renderLocalPresets();
    _flashConsole("deleted "+name);
  });
  _renderLocalPresets();
}

function setup() {
  const stage = document.getElementById("stage");
  const c = createCanvas(stage.clientWidth, stage.clientHeight, WEBGL);
  c.parent(stage);
  stage.insertBefore(c.elt, stage.firstChild);
  const stageTools=document.getElementById("stageTools");
  if(stageTools){
    ["pointerdown","pointermove","pointerup","click","dblclick","wheel","mousedown","mouseup","touchstart"].forEach(type=>{
      stageTools.addEventListener(type,e=>e.stopPropagation(),{passive:false});
    });
  }
  _pCanvas = c.elt;

  theShader = createShader(
    document.getElementById("vert").textContent,
    document.getElementById("frag").textContent
  );

  t0 = millis();

  const tSel = document.getElementById("themeSelect");
  THEME_NAMES.forEach(n=>{ const o=document.createElement("option"); o.value=n; o.textContent=n; tSel.appendChild(o); });
  tSel.addEventListener("change", e=>applyTheme(e.target.value));
  document.getElementById("themePrev").addEventListener("click",()=>cycleTheme(-1));
  document.getElementById("themeNext").addEventListener("click",()=>cycleTheme(1));

  const paramCfg = [
    {id:"sCount",  vid:"vCount",  key:"count",  fmt:v=>Math.round(v).toString()},
    {id:"sRadius", vid:"vRadius", key:"radius", fmt:v=>v.toFixed(2)},
    {id:"sSmooth", vid:"vSmooth", key:"smooth", fmt:v=>v.toFixed(2)},
    {id:"sSpeed",  vid:"vSpeed",  key:"speed",  fmt:v=>v.toFixed(2)},
    {id:"sSpread", vid:"vSpread", key:"spread", fmt:v=>v.toFixed(2)},
    {id:"sSpin",   vid:"vSpin",   key:"spin",   fmt:v=>v.toFixed(2)},
    {id:"sDist",   vid:"vDist",   key:"dist",   fmt:v=>v.toFixed(2)},
    {id:"sElev",   vid:"vElev",   key:"elev",   fmt:v=>v.toFixed(2)},
    {id:"sAO",     vid:"vAO",     key:"ao",     fmt:v=>v.toFixed(2)},
  ];
  paramCfg.forEach(cfg=>{
    const el = document.getElementById(cfg.id);
    el.addEventListener("input", ()=>{
      P[cfg.key] = parseFloat(el.value);
      document.getElementById(cfg.vid).textContent = cfg.fmt(P[cfg.key]);
    });
    el.addEventListener("dblclick", ()=>{
      const def=parseFloat(el.defaultValue); P[cfg.key]=def; el.value=def;
      document.getElementById(cfg.vid).textContent = cfg.fmt(def);
    });
  });

  document.getElementById("bgColor").addEventListener("input",   e=>{ cs.bg   = e.target.value; });
  document.getElementById("formColor").addEventListener("input",  e=>{ cs.form = e.target.value; });
  document.getElementById("hiColor").addEventListener("input",    e=>{ cs.hi   = e.target.value; });
  document.getElementById("sBgVal").addEventListener("input",     e=>{ cs.bgVal=parseFloat(e.target.value); document.getElementById("vBgVal").textContent=cs.bgVal.toFixed(2); });
  document.getElementById("sFormSat").addEventListener("input",   e=>{ cs.fSat =parseFloat(e.target.value); document.getElementById("vFormSat").textContent=cs.fSat.toFixed(2); });
  document.getElementById("sFormVal").addEventListener("input",   e=>{ cs.fVal =parseFloat(e.target.value); document.getElementById("vFormVal").textContent=cs.fVal.toFixed(2); });
  document.getElementById("sRim").addEventListener("input",       e=>{ cs.rim  =parseFloat(e.target.value); document.getElementById("vRim").textContent=cs.rim.toFixed(2); });

  document.getElementById("sPal").addEventListener("input", e=>{
    const idx=clampV(parseInt(e.target.value),0,PALETTES.length-1);
    applyTheme(PALETTES[idx][0]);
  });

  const starterSel = document.getElementById("starterPreset");
  STARTERS.forEach((s,i)=>{ const o=document.createElement("option"); o.value=i; o.textContent=s.name; starterSel.appendChild(o); });
  starterSel.value = "0";
  loadStarter(STARTERS[0], {applyStarterPalette:false});
  let savedTheme = null;
  try{ savedTheme = localStorage.getItem(THEMEKEY); }catch(e){}
  applyTheme(THEME_NAMES.includes(savedTheme) ? savedTheme : "neutral");
  document.getElementById("starterPrev").addEventListener("click",()=>cycleStarter(-1));
  document.getElementById("starterNext").addEventListener("click",()=>cycleStarter(1));
  starterSel.addEventListener("change",()=>{ loadStarter(STARTERS[parseInt(starterSel.value)]); _flashConsole("loaded "+STARTERS[parseInt(starterSel.value)].name); });
_bindConsoleUtilities();

  document.getElementById("btnSave").addEventListener("click", ()=>{ saveCanvas(`noixzy_${PIECE}_${Math.floor(millis())}`, "png"); });
  document.getElementById("btnThumb").addEventListener("click", saveThumb);

  document.getElementById("btnPause").addEventListener("click", ()=>{
    paused = !paused;
    if(paused) pauseT = millis() - t0;
    else t0 = millis() - pauseT;
    document.getElementById("btnPause").textContent = paused ? "play" : "pause";
  });

  document.addEventListener("keydown", e=>{
    if(e.key==="h") document.getElementById("panel").classList.toggle("hidden");
    if(e.key===" "){ e.preventDefault(); document.getElementById("btnPause").click(); }
    if(e.key==="[") cycleTheme(-1);
    if(e.key==="]") cycleTheme(1);
    if(e.key==="s") document.getElementById("btnSave").click();
  });

  const saved = localStorage.getItem(THEMEKEY);
  if(saved && THEME_NAMES.includes(saved)) applyTheme(saved);
  else applyTheme("graphite");

  syncParamUI();
  syncColorUI();
  document.getElementById("vPal").textContent = `${document.getElementById("sPal").value} ${PALETTES[parseInt(document.getElementById("sPal").value)][0]}`;

  _buildAudioUI();
  _loadFavs();
  _initOrbit(stage);
  buildNav();
  window.addEventListener("resize", ()=>{ resizeCanvas(stage.clientWidth, stage.clientHeight); });
}

function draw() {
  if(paused) return;
  _audioApply();
  const t = (millis() - t0) / 1000.0;

  shader(theShader);
  theShader.setUniform("u_res",       [width, height]);
  theShader.setUniform("u_time",      t);
  theShader.setUniform("u_azimuth",   _camAzimuth);
  theShader.setUniform("u_count",     P.count);
  theShader.setUniform("u_seed",      mfSeed);
  theShader.setUniform("u_radius",    P.radius);
  theShader.setUniform("u_smooth",    P.smooth);
  theShader.setUniform("u_speed",     P.speed);
  theShader.setUniform("u_spread",    P.spread);
  theShader.setUniform("u_spin",      P.spin);
  theShader.setUniform("u_dist",      P.dist);
  theShader.setUniform("u_elev",      P.elev);
  theShader.setUniform("u_ao",        P.ao);
  theShader.setUniform("u_bgColor",   hexToRGB(cs.bg));
  theShader.setUniform("u_formColor", hexToRGB(cs.form));
  theShader.setUniform("u_hiColor",   hexToRGB(cs.hi));
  theShader.setUniform("u_bgValue",   cs.bgVal);
  theShader.setUniform("u_formSat",   cs.fSat);
  theShader.setUniform("u_formValue", cs.fVal);
  theShader.setUniform("u_rim",       cs.rim);
  noStroke();
  quad(-1,-1, 1,-1, 1,1, -1,1);
  _audioRestore();
}

const ALL_MODULES=[
  {id:"grid_extrude",         title:"grid extrude"},
  {id:"sdf_raymarch",         title:"sdf raymarch"},
  {id:"gyroid",               title:"gyroid"},
  {id:"displacement",         title:"displacement"},
  {id:"displacement_primitives",title:"displacement primitives"},
  {id:"mandelbulb",           title:"mandelbulb"},
  {id:"fold",                 title:"fold"},
  {id:"metafluid",            title:"metafluid"},
  {id:"flow_field",           title:"flow field"},
  {id:"reaction_diffusion",   title:"reaction diffusion"},
  {id:"voronoi",              title:"voronoi"},
  {id:"contour_field",        title:"contour field"},
  {id:"truchet",              title:"truchet"},
  {id:"truchet_b",            title:"truchet // color"},
  {id:"l_system",             title:"l-system"},
  {id:"cellular_erosion",     title:"cellular erosion"},
  {id:"recursive_grid",       title:"recursive grid"},
  {id:"wave_interference",    title:"wave interference"},
  {id:"stipple",              title:"stipple"},
  {id:"hex_grid",             title:"hex grid"},
  {id:"rose_curve",           title:"rose curve"},
  {id:"lissajous_mesh",       title:"lissajous mesh"},
  {id:"torus_knot",           title:"torus knot"},
];
function buildNav(){
  const idx=ALL_MODULES.findIndex(m=>m.id===PIECE);
  const safeIdx=idx>=0?idx:0;
  const prev=ALL_MODULES[(safeIdx-1+ALL_MODULES.length)%ALL_MODULES.length];
  const next=ALL_MODULES[(safeIdx+1)%ALL_MODULES.length];

  const np=document.getElementById("navPrev"); if(np){ np.href="../"+prev.id+"/noixzy_"+prev.id+".html"; np.title=prev.title; }
  const nn=document.getElementById("navNext"); if(nn){ nn.href="../"+next.id+"/noixzy_"+next.id+".html"; nn.title=next.title; }

  const rail=document.getElementById("stageThumbs");
  if(rail){
    ["pointerdown","mousedown","mouseup","touchstart"].forEach(type=>{
      rail.addEventListener(type,e=>e.stopPropagation(),true);
    });
  }

  const strip=document.getElementById("moduleThumbStrip"); if(!strip) return;
  strip.innerHTML="";
  let railSelected=safeIdx;

  function selectThumb(i){
    const links=[...strip.querySelectorAll(".navThumb")];
    if(!links.length) return;
    railSelected=(i+links.length)%links.length;
    links.forEach(a=>a.classList.remove("selected"));
    links[railSelected].classList.add("selected");
    links[railSelected].scrollIntoView({block:"nearest",inline:"nearest",behavior:"smooth"});
  }

  ALL_MODULES.forEach(m=>{
    const a=document.createElement("a");
    a.href="../"+m.id+"/noixzy_"+m.id+".html";
    a.title=m.title;
    a.className="navThumb"+(m.id===PIECE?" active":"");
    a.onclick=e=>{ e.preventDefault(); e.stopPropagation(); window.location.href=a.href; };
    const img=document.createElement("img"); img.src="../gallery/thumbs/"+m.id+".png"; img.alt=m.title;
    a.appendChild(img); strip.appendChild(a);
  });

  const up=document.getElementById("thumbUp");
  const down=document.getElementById("thumbDown");
  if(up){ up.onclick=e=>{ e.preventDefault(); e.stopPropagation(); selectThumb(railSelected-1); }; }
  if(down){ down.onclick=e=>{ e.preventDefault(); e.stopPropagation(); selectThumb(railSelected+1); }; }

  setTimeout(()=>{ const el=strip.querySelector(".active"); if(el){ el.scrollIntoView({block:"center",inline:"nearest"}); } },50);
}
