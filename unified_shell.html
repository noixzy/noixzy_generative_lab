<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>noixzy // unified shell</title>
<style>
  :root {
    --rail-h: 104px;
    --bg: #000;
    --rail: #000;
    --rail-2: #000;
    --line: rgba(255, 255, 255, .14);
    --line-soft: rgba(255, 255, 255, .08);
    --ink: #f1f0ec;
    --dim: #888a91;
    --accent: #b7ff2a;
    --thumb-w: 96px;
    --thumb-h: 63px;
    --logo-w: 132px;
    --logo-h: 56px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    width: 100%;
    height: 100%;
    margin: 0;
  }

  body {
    overflow: hidden;
    background: var(--bg);
    color: var(--ink);
  }

  .shell {
    min-height: 100vh;
    background: var(--bg);
  }

  .rail {
    position: fixed;
    inset: 0 0 auto;
    z-index: 10;
    height: var(--rail-h);
    display: flex;
    align-items: center;
    padding: 12px 14px;
    background: #000;
    border-bottom: 1px solid var(--line);
  }

  .logoOverlay {
    position: absolute;
    left: 50%;
    top: 19px;
    z-index: 2;
    width: 160px;
    height: 63px;
    display: flex;
    align-items: center;
    justify-content: center;
    transform: translateX(-50%);
    border: none;
    border-radius: 8px;
    background: #000;
    cursor: pointer;
    text-decoration: none;
    pointer-events: auto;
  }

  .thumbRail {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    height: var(--thumb-h);
    min-width: 0;
    transform: translateY(0px);
    overflow-x: auto;
    overflow-y: hidden;
    scrollbar-width: thin;
    scrollbar-color: rgba(18, 18, 20, .96) transparent;
  }

  .thumbRail::-webkit-scrollbar {
    height: 5px;
  }

  .thumbRail::-webkit-scrollbar-track {
    background: transparent;
  }

  .thumbRail::-webkit-scrollbar-thumb {
    background: rgba(18, 18, 20, .96);
    border-radius: 999px;
  }

  .moduleButton {
    width: var(--thumb-w);
    height: var(--thumb-h);
    flex: 0 0 var(--thumb-w);
    display: block;
    margin: 0;
    padding: 0;
    border: 1px solid rgba(255, 255, 255, .16);
    border-radius: 7px;
    overflow: hidden;
    background: #000;
    cursor: pointer;
    opacity: .72;
    transition: border-color .14s ease, opacity .14s ease, transform .14s ease;
  }

  .moduleButton:hover {
    opacity: .96;
    border-color: rgba(255, 255, 255, .72);
  }

  .moduleButton[aria-selected="true"] {
    opacity: 1;
    border-color: rgba(255, 255, 255, .42);
  }

  .moduleButton:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 3px;
  }

  .moduleButton img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    pointer-events: none;
  }

  .logoOverlay img {
    display: block;
    width: var(--logo-w);
    height: var(--logo-h);
    max-width: 132px;
    max-height: 56px;
    object-fit: contain;
    opacity: .96;
    pointer-events: none;
  }

  .logoOverlay .fallback {
    color: var(--accent);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: lowercase;
  }

  .stage {
    position: fixed;
    inset: var(--rail-h) 0 0;
    background: #000;
  }

  #moduleFrame {
    display: block;
    width: 100%;
    height: calc(100vh - var(--rail-h));
    border: none;
    background: #000;
  }

  .status {
    position: fixed;
    left: 50%;
    top: calc(var(--rail-h) + 16px);
    z-index: 2;
    transform: translateX(-50%);
    max-width: min(620px, calc(100vw - 32px));
    padding: 9px 12px;
    border: 1px solid rgba(255, 255, 255, .16);
    border-radius: 6px;
    background: rgba(0, 0, 0, .72);
    color: var(--dim);
    font-size: 11px;
    line-height: 1.45;
    letter-spacing: .04em;
  }

  .status[hidden] {
    display: none;
  }

  @media (max-width: 760px) {
    :root {
      --rail-h: 96px;
      --thumb-w: 82px;
      --thumb-h: 52px;
      --logo-w: 132px;
      --logo-h: 56px;
    }

    .logoOverlay {
      width: 132px;
      height: 52px;
      top: 17px;
    }

    .rail {
      padding: 10px;
    }
  }

  /* NOIXZY_DEBUG_GRID_100X4 */
  body.debugGrid::before {
    content: "";
    position: fixed;
    inset: 0;
    z-index: 2147483646;
    pointer-events: none;
    opacity: .38;
    background-image:
      linear-gradient(to right, rgba(255,255,255,.12) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,.12) 1px, transparent 1px),
      linear-gradient(to right, rgba(255,255,255,.32) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,.32) 1px, transparent 1px);
    background-size:
      25px 25px,
      25px 25px,
      100px 100px,
      100px 100px;
    background-position:
      calc(50vw - 50px) calc(50vh - 50px),
      calc(50vw - 50px) calc(50vh - 50px),
      calc(50vw - 50px) calc(50vh - 50px),
      calc(50vw - 50px) calc(50vh - 50px);
  }



</style>
</head>
<body class="debugGrid">
<div class="shell">
  <header class="rail" aria-label="module rail">
    <nav class="thumbRail" id="moduleRail" aria-label="modules"></nav>
    <a class="logoOverlay" href="gallery/index.html" aria-label="Back to gallery">
      <img src="gallery/gallery.svg" alt="" onerror="this.replaceWith(Object.assign(document.createElement('span'), { className: 'fallback', textContent: 'noixzy' }))">
    </a>
  </header>

  <main class="stage">
    <div class="status" id="status">loading modules.manifest.json</div>
    <iframe id="moduleFrame" title="noixzy module"></iframe>
  </main>
</div>

<script>
(() => {
  const manifestPath = "modules.manifest.json";
  const frame = document.getElementById("moduleFrame");
  const moduleRail = document.getElementById("moduleRail");
  const status = document.getElementById("status");
  let enabledModules = [];
  let activeId = "";
  const galleryOrder = [
    "grid_extrude",
    "sdf_raymarch",
    "gyroid",
    "displacement",
    "displacement_primitives",
    "mandelbulb",
    "fold",
    "metafluid",
    "moire_field",
    "particle_orbitals",
    "radial_noise",
    "kaleidoscope_field",
    "topographic_rings",
    "ribbon_flow",
    "glyph_field",
    "crystal_growth",
    "vector_scope",
    "wave_lattice",
    "fractal_tiles",
    "plasma_membrane",
    "interference_grid",
    "cellular_bloom",
    "vortex_sheet",
    "prism_moire",
    "terrain_slice",
    "signal_weave",
    "crater_field",
    "spiral_lattice",
    "signal_rain",
    "echo_contours",
    "magnetic_dust",
    "neural_lattice",
    "flow_field",
    "reaction_diffusion",
    "voronoi",
    "contour_field",
    "truchet",
    "truchet_b",
    "l_system",
    "cellular_erosion",
    "recursive_grid",
    "wave_interference",
    "stipple",
    "hex_grid",
    "rose_curve",
    "lissajous_mesh",
    "torus_knot"
  ];
  const galleryOrderIndex = new Map(galleryOrder.map((id, index) => [id, index]));

  const setStatus = (message) => {
    status.textContent = message;
    status.hidden = !message;
  };

  const moduleFromUrl = () => {
    const params = new URLSearchParams(window.location.search);
    return params.get("module") || "";
  };

  const setModuleParam = (id, mode = "push") => {
    const url = new URL(window.location.href);
    url.searchParams.set("module", id);
    const method = mode === "replace" ? "replaceState" : "pushState";
    history[method]({ module: id }, "", url);
  };

  const findEnabledModule = (id) => enabledModules.find((module) => module.id === id);

  const selectModule = (id, options = {}) => {
    const fallback = enabledModules[0];
    const module = findEnabledModule(id) || fallback;
    if (!module) {
      setStatus("No modules are enabled for the shell.");
      return;
    }

    const changed = activeId !== module.id;
    activeId = module.id;
    frame.src = module.file;
    frame.title = module.title || module.id;
    document.title = `${module.title || module.id} // noixzy shell`;

    document.querySelectorAll(".moduleButton").forEach((button) => {
      const selected = button.dataset.moduleId === module.id;
      button.setAttribute("aria-selected", String(selected));
      button.tabIndex = selected ? 0 : -1;
    });

    if (options.updateUrl) {
      setModuleParam(module.id, options.replaceUrl ? "replace" : "push");
    }

    setStatus("");

    if (changed) {
      const selectedButton = document.querySelector(`.moduleButton[data-module-id="${CSS.escape(module.id)}"]`);
      selectedButton?.scrollIntoView({ block: "nearest", inline: "nearest" });
    }
  };

  const createThumb = (module) => {
    const button = document.createElement("button");
    button.className = "moduleButton";
    button.type = "button";
    button.dataset.moduleId = module.id;
    button.setAttribute("aria-selected", "false");
    button.title = module.title || module.id;
    button.ariaLabel = module.title || module.id;

    const img = document.createElement("img");
    img.src = `gallery/thumbs/${module.id}.png`;
    img.alt = "";
    img.loading = "lazy";
    img.decoding = "async";
    button.append(img);

    button.addEventListener("click", () => {
      selectModule(module.id, { updateUrl: true });
    });

    return button;
  };

  const renderRail = () => {
    moduleRail.replaceChildren();
    enabledModules.forEach((module) => moduleRail.append(createThumb(module)));
  };

  const sortByGalleryOrder = (modules) => {
    return modules
      .map((module, manifestIndex) => ({ module, manifestIndex }))
      .sort((a, b) => {
        const aIndex = galleryOrderIndex.has(a.module.id) ? galleryOrderIndex.get(a.module.id) : Infinity;
        const bIndex = galleryOrderIndex.has(b.module.id) ? galleryOrderIndex.get(b.module.id) : Infinity;
        return aIndex - bIndex || a.manifestIndex - b.manifestIndex;
      })
      .map((entry) => entry.module);
  };

  const init = async () => {
    try {
      const response = await fetch(manifestPath, { cache: "no-store" });
      if (!response.ok) {
        throw new Error(`manifest request failed: ${response.status}`);
      }

      const manifest = await response.json();
      enabledModules = sortByGalleryOrder(
        (manifest.modules || []).filter((module) => module.enabledInShell === true)
      );
      renderRail();

      const requestedId = moduleFromUrl();
      const hasRequestedModule = Boolean(findEnabledModule(requestedId));
      selectModule(requestedId, {
        updateUrl: Boolean(requestedId && !hasRequestedModule),
        replaceUrl: true
      });
    } catch (error) {
      setStatus(`Unable to load ${manifestPath}: ${error.message}`);
    }
  };

  window.addEventListener("popstate", () => {
    selectModule(moduleFromUrl());
  });

  init();
})();
</script>
</body>
</html>
