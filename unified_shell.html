<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>noixzy // unified shell</title>
<style>
  :root {
    --rail-h: 78px;
    --ctrl-h: 28px;
    --stage-top: calc(var(--rail-h) + var(--ctrl-h));
    --bg: #000;
    --rail: #000;
    --rail-2: #000;
    --line: rgba(255, 255, 255, .14);
    --line-soft: rgba(255, 255, 255, .08);
    --ink: #f1f0ec;
    --dim: #888a91;
    --accent: #d8d8d8;
    --thumb-w: 76px;
    --thumb-h: 48px;
    --logo-w: 82px;
    --logo-h: 57px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    width: 100%;
    height: 100%;
    margin: 0;
    background: #000;
  }

  body {
    overflow: hidden;
    background: var(--bg);
    color: var(--ink);
  }

  .shell {
    min-height: 100vh;
    background: var(--bg);
  }

  .rail {
    position: fixed;
    inset: 0 0 auto;
    z-index: 10;
    height: var(--rail-h);
    display: flex;
    align-items: center;
    padding: 12px 14px;
    overflow: hidden;
    background: #000;
    border-bottom: none;
    box-shadow:
      0 0 18px rgba(255,255,255,.10),
      0 10px 28px rgba(255,255,255,.055),
      inset 0 -1px 0 rgba(255,255,255,.08);
    isolation: isolate;
  }
  .rail::before {
    content: none !important;
    display: none !important;
    animation: none;
    background: none !important;
  }

  .logoOverlay {
    position: absolute;
    left: 50%;
    top: 14px;
    z-index: 10;
    width: 88px;
    height: 88px;
    display: flex;
    align-items: center;
    justify-content: center;
    transform: translateX(-50%);
    border: none;
    border-radius: 8px;
    background: radial-gradient(ellipse at center, #000 0%, #000 85%, rgba(0,0,0,0) 100%);
    cursor: pointer;
    text-decoration: none;
    pointer-events: auto;
  }

  .thumbRail {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    height: var(--thumb-h);
    min-width: 0;
    transform: translateY(2px);
    overflow-x: auto;
    overflow-y: hidden;
    scrollbar-width: thin;
    scrollbar-color: rgba(18, 18, 20, .96) transparent;
  }

  .thumbRail::-webkit-scrollbar {
    height: 5px;
  }

  .thumbRail::-webkit-scrollbar-track {
    background: transparent;
  }

  .thumbRail::-webkit-scrollbar-thumb {
    background: rgba(18, 18, 20, .96);
    border-radius: 999px;
  }

  .moduleButton {
    width: var(--thumb-w);
    height: var(--thumb-h);
    flex: 0 0 var(--thumb-w);
    display: block;
    margin: 0;
    padding: 0;
    border: 1px solid transparent;
    border-radius: 7px;
    overflow: visible;
    background: rgba(0, 0, 0, .18);
    cursor: pointer;
    opacity: .50;
    box-shadow: none;
    transition: opacity .14s ease, transform .14s ease;
  }

  .moduleButton:hover {
    opacity: .58;
  }

  .moduleButton[aria-selected="true"] {
    opacity: .64;
  }

  .moduleButton:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 3px;
  }

  .moduleButton img {
    display: block;
    width: 100%;
    height: 100%;
    filter: grayscale(1) contrast(1.08) brightness(.82) drop-shadow(0 0 8px rgba(255,255,255,.12));
    object-fit: cover;
    pointer-events: none;
  }

  .logoOverlay img {
    display: block;
    width: var(--logo-w);
    height: var(--logo-h);
    max-width: 88px;
    max-height: 88px;
    object-fit: contain;
    opacity: .96;
    pointer-events: none;
    transform: translateY(-16px) scale(1.42);
    transform-origin: center;
  }

  .logoOverlay .fallback {
    color: var(--accent);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .12em;
    transform: translateY(-18px) scale(1.42);
  }

  body.logoBadgeHidden .logoOverlay {
    display: none !important;
  }

  .settingsShell {
    position: relative;
    top: -2px;
    right: 0;
    z-index: 2147483647;
  }

  .settingsButton {
    width: 18px;
    height: 18px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin: 0;
    padding: 0;
    border: 0;
    border-radius: 0;
    background: rgba(0, 0, 0, .88);
    color: var(--ink);
    cursor: pointer;
  }

  .settingsButton:hover,
  .settingsButton[aria-expanded="true"] {
    border-color: rgba(255, 255, 255, .52);
  }

  .settingsButton:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 3px;
  }

  .settingsButtonIcon,
  .settingsButtonIcon::before,
  .settingsButtonIcon::after {
    width: 7px;
    height: 1px;
    display: block;
    background: currentColor;
    opacity: .5;
  }

  .settingsButtonIcon {
    position: relative;
  }

  .settingsButtonIcon::before,
  .settingsButtonIcon::after {
    content: "";
    position: absolute;
    left: 0;
  }

  .settingsButtonIcon::before {
    top: -3px;
  }

  .settingsButtonIcon::after {
    top: 3px;
  }

  .settingsMenu {
    position: absolute;
    top: 10px;
    right: 0;
    min-width: 98px;
    padding: 7px;
    border: 0;
    border-radius: 7px;
    background: rgba(0, 0, 0, .94);
    box-shadow: 0 14px 34px rgba(0, 0, 0, .46);
  }

  .settingsMenu[hidden] {
    display: none;
  }

  .settingsToggle {
    min-height: 30px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 5px 6px;
    color: var(--ink);
    font-size: 9px;
    line-height: 1;
    letter-spacing: .04em;
    cursor: pointer;
    user-select: none;
  }

  .settingsToggle input {
    appearance: none;
    -webkit-appearance: none;
    width: 8px;
    height: 8px;
    margin: 0;
    display: grid;
    place-content: center;
    border: 1px solid rgba(255, 255, 255, .38);
    border-radius: 1px;
    background: transparent;
    cursor: pointer;
  }

  .settingsToggle span {
    opacity: .62;
  }

  .settingsToggle input:checked::after {
    content: "";
    width: 3px;
    height: 5px;
    margin-top: -1px;
    border: solid rgba(255, 255, 255, .88);
    border-width: 0 1px 1px 0;
    transform: rotate(45deg);
  }

  .settingsToggle input:focus-visible {
    outline: 1px solid var(--accent);
    outline-offset: 2px;
  }

  .stage {
    position: fixed;
    inset: var(--stage-top) 0 0;
    background: #000;
  }

  #moduleFrame {
    display: block;
    width: 100%;
    height: calc(100vh - var(--stage-top));
    border: 0 !important;
    outline: 0 !important;
    box-shadow: none !important;
    appearance: none;
    -webkit-appearance: none;
    background: #000;
    background-color: #000;
  }

  #moduleFrame:focus,
  #moduleFrame:focus-visible {
    outline: 0 !important;
    box-shadow: none !important;
  }

  .status {
    position: fixed;
    left: 50%;
    top: calc(var(--stage-top) + 8px);
    z-index: 13;
    transform: translateX(-50%);
    max-width: min(620px, calc(100vw - 32px));
    padding: 9px 12px;
    border: 1px solid rgba(255, 255, 255, .16);
    border-radius: 6px;
    background: rgba(0, 0, 0, .72);
    color: var(--dim);
    font-size: 11px;
    line-height: 1.45;
    letter-spacing: .04em;
  }

  .status[hidden] {
    display: none;
  }

  @media (max-width: 760px) {
    :root {
      --rail-h: 96px;
      --stage-top: calc(var(--rail-h) + var(--ctrl-h));
      --thumb-w: 82px;
      --thumb-h: 52px;
      --logo-w: calc(var(--thumb-w) * 1.36);
      --logo-h: calc(var(--thumb-h) * .88);
    }

    .logoOverlay {
      width: 88px;
      height: 88px;
      top: 15px;
    }

    .rail {
      padding: 10px;
    }

    .settingsShell {
      top: -2px;
      right: 0;
    }
  }

  /* NOIXZY_DEBUG_GRID_100X4 */
  body.debugGrid::before {
    content: "";
    position: fixed;
    inset: 0;
    z-index: 2147483646;
    pointer-events: none;
    opacity: .54;
    background-image:
      linear-gradient(to right, rgba(255,255,255,.12) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,.12) 1px, transparent 1px),
      linear-gradient(to right, rgba(255,255,255,.32) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,.32) 1px, transparent 1px);
    background-size:
      25px 25px,
      25px 25px,
      100px 100px,
      100px 100px;
    background-position:
      calc(50vw - 50px) calc(50vh - 50px),
      calc(50vw - 50px) calc(50vh - 50px),
      calc(50vw - 50px) calc(50vh - 50px),
      calc(50vw - 50px) calc(50vh - 50px);
  }

  /* NOIXZY_RAIL_CRT_VHS_OVERLAY */




  /* NOIXZY_RAIL_CRT_VHS_OVERLAY */
  .rail::after {
    content: "";
    position: absolute;
    left: 0;
    right: 0;
    top: 24px;
    height: 49px;
    z-index: 5;
    pointer-events: none;
    opacity: .54;
    mix-blend-mode: screen;
    background-image:
      repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.07) 0px,
        rgba(255,255,255,.07) 1px,
        transparent 1px,
        transparent 1.6px
      );
  }


  /* ── Control Strip ───────────────────────────────────────────────────────── */

  .controlStrip {
    position: fixed;
    inset: var(--rail-h) 0 auto;
    z-index: 9;
    height: var(--ctrl-h);
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 0 10px;
    background: #000;
    border-bottom: 1px solid rgba(255, 255, 255, .07);
    overflow-x: auto;
    scrollbar-width: none;
  }

  .controlStrip::-webkit-scrollbar { display: none; }

  .searchBox {
    flex: 1;
    min-width: 72px;
    max-width: 220px;
    height: 18px;
    padding: 0 6px;
    border: 1px solid rgba(255, 255, 255, .16);
    border-radius: 3px;
    background: rgba(255, 255, 255, .04);
    color: var(--ink);
    font: inherit;
    font-size: 9px;
    letter-spacing: .05em;
    outline: none;
    -webkit-appearance: none;
  }

  .searchBox::placeholder { color: var(--dim); opacity: .7; }
  .searchBox:focus { border-color: rgba(255, 255, 255, .32); }
  .searchBox::-webkit-search-cancel-button { -webkit-appearance: none; }

  .ctrlBtn {
    flex-shrink: 0;
    height: 18px;
    padding: 0 5px;
    border: 1px solid rgba(255, 255, 255, .11);
    border-radius: 3px;
    background: transparent;
    color: var(--dim);
    font: inherit;
    font-size: 8px;
    letter-spacing: .06em;
    cursor: pointer;
    white-space: nowrap;
    transition: color .1s, border-color .1s;
  }

  .ctrlBtn:hover {
    color: var(--ink);
    border-color: rgba(255, 255, 255, .3);
  }

  .ctrlBtn:focus-visible {
    outline: 1px solid var(--accent);
    outline-offset: 1px;
  }

  .ctrlSep {
    flex-shrink: 0;
    width: 1px;
    height: 12px;
    background: rgba(255, 255, 255, .1);
  }

  /* ── Control Strip ───────────────────────────────────────────────────────── */

  /* NOIXZY_BADGE_EDGE_FADE */
  .logoOverlay::before,
  .logoOverlay::after {
    content: "";
    position: absolute;
    top: 0;
    width: 15px;
    height: 100%;
    z-index: 1;
    pointer-events: none;
  }

  .logoOverlay::before {
    right: 100%;
    background: linear-gradient(to left, #000 0%, rgba(0,0,0,0) 100%);
  }

  .logoOverlay::after {
    left: 100%;
    background: linear-gradient(to right, #000 0%, rgba(0,0,0,0) 100%);
  }

</style>
</head>
<body class="debugGrid">
<div class="shell">
  <header class="rail" aria-label="module rail">
    <nav class="thumbRail" id="moduleRail" aria-label="modules"></nav>
    <a class="logoOverlay" href="gallery/index.html" aria-label="Back to gallery">
      <img src="gallery/gallery.svg" alt="" onerror="this.replaceWith(Object.assign(document.createElement('span'), { className: 'fallback', textContent: 'noixzy' }))">
    </a>
    <div class="settingsShell">
      <button class="settingsButton" id="settingsButton" type="button" aria-label="Settings" aria-haspopup="true" aria-expanded="false" aria-controls="settingsMenu" title="Settings">
        <span class="settingsButtonIcon" aria-hidden="true"></span>
      </button>
      <div class="settingsMenu" id="settingsMenu" role="group" aria-label="Shell settings" hidden>
        <label class="settingsToggle">
          <span>Grid</span>
          <input id="gridToggle" type="checkbox" aria-label="Grid">
        </label>
        <label class="settingsToggle">
          <span>Logo Badge</span>
          <input id="logoBadgeToggle" type="checkbox" aria-label="Logo Badge">
        </label>
      </div>
    </div>
  </header>

  <div class="controlStrip" id="controlStrip" role="toolbar" aria-label="Module controls">
    <button class="ctrlBtn" id="cssPrev"     type="button" title="Previous Module (←)">prev</button>
    <button class="ctrlBtn" id="cssNext"     type="button" title="Next Module (→)">next</button>
    <span class="ctrlSep" aria-hidden="true"></span>
    <input class="searchBox" id="moduleSearch" type="search" placeholder="/ search modules" autocomplete="off" spellcheck="false" aria-label="Search modules">
    <span class="ctrlSep" aria-hidden="true"></span>
    <button class="ctrlBtn" id="cssPause"    type="button" title="Pause / Resume (Space)">pause</button>
    <button class="ctrlBtn" id="cssReset"    type="button" title="Reset (R)">reset</button>
    <span class="ctrlSep" aria-hidden="true"></span>
    <button class="ctrlBtn" id="cssSeed"     type="button" title="New Seed (N)">seed</button>
    <button class="ctrlBtn" id="cssRndForm"  type="button" title="Random Form (F)">form</button>
    <button class="ctrlBtn" id="cssRndColor" type="button" title="Random Color">color</button>
    <button class="ctrlBtn" id="cssRndAll"   type="button" title="Random All (A)">rnd</button>
    <span class="ctrlSep" aria-hidden="true"></span>
    <button class="ctrlBtn" id="cssSave"     type="button" title="Save (S)">save</button>
    <button class="ctrlBtn" id="cssSave2x"   type="button" title="Save 2×">2×</button>
    <button class="ctrlBtn" id="cssThumb"    type="button" title="Thumbnail (T)">thumb</button>
    <button class="ctrlBtn" id="cssRec"      type="button" title="Record">rec</button>
    <span class="ctrlSep" aria-hidden="true"></span>
    <button class="ctrlBtn" id="cssBg"       type="button" title="Transparent Background (B)">bg</button>
    <button class="ctrlBtn" id="cssUndo"     type="button" title="Undo (⌘Z)">undo</button>
    <button class="ctrlBtn" id="cssRedo"     type="button" title="Redo (⌘⇧Z)">redo</button>
    <button class="ctrlBtn" id="cssCopy"     type="button" title="Copy">copy</button>
    <button class="ctrlBtn" id="cssPaste"    type="button" title="Paste">paste</button>
  </div>

  <main class="stage">
    <div class="status" id="status">loading modules.manifest.json</div>
    <iframe id="moduleFrame" title="noixzy module"></iframe>
  </main>
</div>

<script>
(() => {
  const manifestPath = "modules.manifest.json";
  const frame = document.getElementById("moduleFrame");
  const moduleRail = document.getElementById("moduleRail");
  const status = document.getElementById("status");
  const settingsButton = document.getElementById("settingsButton");
  const settingsMenu = document.getElementById("settingsMenu");
  const gridToggle = document.getElementById("gridToggle");
  const logoBadgeToggle = document.getElementById("logoBadgeToggle");
  const settingsStorageKeys = {
    grid: "noixzyShell.grid",
    logoBadge: "noixzyShell.logoBadge"
  };
  const shellUiStyleId = "__noixzyShellUiCleanup";
  const shellUiDockId = "__noixzyShellProductionDock";
  let enabledModules = [];
  let activeId = "";

  // "fold" removed — file missing, archived in _archive/fold
  const galleryOrder = [
    "grid_extrude",
    "sdf_raymarch",
    "gyroid",
    "displacement",
    "displacement_primitives",
    "mandelbulb",
    "metafluid",
    "moire_field",
    "particle_orbitals",
    "radial_noise",
    "kaleidoscope_field",
    "topographic_rings",
    "ribbon_flow",
    "glyph_field",
    "crystal_growth",
    "vector_scope",
    "wave_lattice",
    "fractal_tiles",
    "plasma_membrane",
    "interference_grid",
    "cellular_bloom",
    "vortex_sheet",
    "prism_moire",
    "terrain_slice",
    "signal_weave",
    "crater_field",
    "spiral_lattice",
    "signal_rain",
    "echo_contours",
    "magnetic_dust",
    "neural_lattice",
    "hyperbolic_tiling",
    "voronoi_tower_field",
    "catenary_web",
    "reaction_terraces",
    "quasicrystal_relief",
    "agent_swarm_relief",
    "tensegrity_nodes",
    "phyllotaxis_stack",
    "origami_fold_field",
    "woven_lattice_relief",
    "flow_field",
    "reaction_diffusion",
    "voronoi",
    "contour_field",
    "truchet",
    "truchet_b",
    "l_system",
    "cellular_erosion",
    "recursive_grid",
    "wave_interference",
    "stipple",
    "hex_grid",
    "rose_curve",
    "lissajous_mesh",
    "torus_knot"
  ];
  const galleryOrderIndex = new Map(galleryOrder.map((id, index) => [id, index]));

  const setStatus = (message) => {
    status.textContent = message;
    status.hidden = !message;
  };

  const readStoredBool = (key, fallback) => {
    try {
      const value = localStorage.getItem(key);
      return value === null ? fallback : value === "true";
    } catch (error) {
      return fallback;
    }
  };

  const writeStoredBool = (key, value) => {
    try {
      localStorage.setItem(key, String(value));
    } catch (error) {
      // Storage can be unavailable in private or restricted contexts.
    }
  };

  const applyGridState = (enabled) => {
    document.body.classList.toggle("debugGrid", enabled);
    gridToggle.checked = enabled;
    writeStoredBool(settingsStorageKeys.grid, enabled);
  };

  const applyLogoBadgeState = (enabled) => {
    document.body.classList.toggle("logoBadgeHidden", !enabled);
    logoBadgeToggle.checked = enabled;
    writeStoredBool(settingsStorageKeys.logoBadge, enabled);
  };

  const closeSettingsMenu = () => {
    settingsMenu.hidden = true;
    settingsButton.setAttribute("aria-expanded", "false");
  };

  const toggleSettingsMenu = () => {
    const shouldOpen = settingsMenu.hidden;
    settingsMenu.hidden = !shouldOpen;
    settingsButton.setAttribute("aria-expanded", String(shouldOpen));
  };

  const initSettings = () => {
    applyGridState(readStoredBool(settingsStorageKeys.grid, true));
    applyLogoBadgeState(readStoredBool(settingsStorageKeys.logoBadge, true));

    settingsButton.addEventListener("click", () => {
      toggleSettingsMenu();
    });

    gridToggle.addEventListener("change", () => {
      applyGridState(gridToggle.checked);
    });

    logoBadgeToggle.addEventListener("change", () => {
      applyLogoBadgeState(logoBadgeToggle.checked);
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeSettingsMenu();
      }
    });

    document.addEventListener("click", (event) => {
      if (!settingsMenu.hidden && !event.target.closest(".settingsShell")) {
        closeSettingsMenu();
      }
    });
  };

  const moduleFromUrl = () => {
    const params = new URLSearchParams(window.location.search);
    return params.get("module") || "";
  };

  const setModuleParam = (id, mode = "push") => {
    const url = new URL(window.location.href);
    url.searchParams.set("module", id);
    const method = mode === "replace" ? "replaceState" : "pushState";
    history[method]({ module: id }, "", url);
  };

  const findEnabledModule = (id) => enabledModules.find((module) => module.id === id);

  const selectModule = (id, options = {}) => {
    const fallback = enabledModules[0];
    const module = findEnabledModule(id) || fallback;
    if (!module) {
      setStatus("No modules are enabled for the shell.");
      return;
    }

    const changed = activeId !== module.id;
    activeId = module.id;
    frame.src = module.file;
    frame.title = module.title || module.id;
    document.title = `${module.title || module.id} // noixzy shell`;

    document.querySelectorAll(".moduleButton").forEach((button) => {
      const selected = button.dataset.moduleId === module.id;
      button.setAttribute("aria-selected", String(selected));
      button.tabIndex = selected ? 0 : -1;
    });

    if (options.updateUrl) {
      setModuleParam(module.id, options.replaceUrl ? "replace" : "push");
    }

    setStatus("");

    if (changed) {
      const selectedButton = document.querySelector(`.moduleButton[data-module-id="${CSS.escape(module.id)}"]`);
      selectedButton?.scrollIntoView({ block: "nearest", inline: "nearest" });
    }
  };

  const createThumb = (module) => {
    const button = document.createElement("button");
    button.className = "moduleButton";
    button.type = "button";
    button.dataset.moduleId = module.id;
    button.setAttribute("aria-selected", "false");
    button.title = module.title || module.id;
    button.ariaLabel = module.title || module.id;

    const img = document.createElement("img");
    img.src = `gallery/thumbs/${module.id}.png`;
    img.alt = "";
    img.loading = "lazy";
    img.decoding = "async";
    button.append(img);

    button.addEventListener("click", () => {
      selectModule(module.id, { updateUrl: true });
    });

    return button;
  };

  const renderRail = () => {
    moduleRail.replaceChildren();
    enabledModules.forEach((module) => moduleRail.append(createThumb(module)));
  };

  const sortByGalleryOrder = (modules) => {
    return modules
      .map((module, manifestIndex) => ({ module, manifestIndex }))
      .sort((a, b) => {
        const aIndex = galleryOrderIndex.has(a.module.id) ? galleryOrderIndex.get(a.module.id) : Infinity;
        const bIndex = galleryOrderIndex.has(b.module.id) ? galleryOrderIndex.get(b.module.id) : Infinity;
        return aIndex - bIndex || a.manifestIndex - b.manifestIndex;
      })
      .map((entry) => entry.module);
  };

  const init = async () => {
    try {
      const response = await fetch(manifestPath, { cache: "no-store" });
      if (!response.ok) {
        throw new Error(`manifest request failed: ${response.status}`);
      }

      const manifest = await response.json();
      enabledModules = sortByGalleryOrder(
        (manifest.modules || []).filter((module) => module.enabledInShell === true)
      );
      renderRail();

      const requestedId = moduleFromUrl();
      const hasRequestedModule = Boolean(findEnabledModule(requestedId));
      selectModule(requestedId, {
        updateUrl: Boolean(requestedId && !hasRequestedModule),
        replaceUrl: true
      });
    } catch (error) {
      setStatus(`Unable to load ${manifestPath}: ${error.message}`);
    }
  };

  window.addEventListener("popstate", () => {
    selectModule(moduleFromUrl());
  });

  // ── Panel reveal: undo always-on GEOMETRY_ONLY_MODE inside the iframe ────────
  // Generated modules (post-build_lab.js fix) use body.geoOnly; hand-authored
  // modules still have GEOMETRY_ONLY_MODE as always-on CSS. This injection
  // appends an override style after load to restore the panel and stage layout
  // for both cases without touching any module art files.
  const revealModulePanel = () => {
    try {
      const doc = frame.contentDocument || frame.contentWindow?.document;
      if (!doc || !doc.head) return;
      if (doc.getElementById("__noixzyShellReveal")) return;
      const s = doc.createElement("style");
      s.id = "__noixzyShellReveal";
      s.textContent =
        // Restore body to normal flow (GEOMETRY_ONLY_MODE makes it position:fixed)
        "body{position:static!important;}" +
        // Restore stage to flex child (GEOMETRY_ONLY_MODE makes it position:fixed; inset:0)
        ".stage,#stage{position:relative!important;inset:auto!important;" +
          "width:auto!important;height:100%!important;overflow:hidden!important;}" +
        // Make panel visible
        ".panel{display:block!important;visibility:visible!important;pointer-events:auto!important;}" +
        // Make controls inside the panel visible and interactive
        ".panel button,.panel select,.panel input,.panel textarea,.panel label{" +
          "display:revert!important;visibility:visible!important;pointer-events:auto!important;}";
      doc.head.appendChild(s);
    } catch (_) {}
  };

  const rebalanceModuleUi = () => {
    try {
      const doc = frame.contentDocument || frame.contentWindow?.document;
      if (!doc || !doc.head || !doc.body) return;

      if (!doc.getElementById(shellUiStyleId)) {
        const s = doc.createElement("style");
        s.id = shellUiStyleId;
        s.textContent = [
          ".stageThumbs,#stageThumbs,.stageTools,#stageTools,.previewHistory,#previewHistory{display:none!important;visibility:hidden!important;pointer-events:none!important;}",
          ".panel{display:flex!important;flex-direction:column!important;gap:10px!important;overflow-y:auto!important;}",
          ".panel>*{min-width:0;}",
          "#"+shellUiDockId+"{display:grid;gap:12px;margin:0 0 10px;padding:12px;border:1px solid rgba(255,255,255,.08);border-radius:10px;background:rgba(0,0,0,.22);}",
          "#"+shellUiDockId+" .shellSectionLabel{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin:0 0 6px;}",
          "#"+shellUiDockId+" .shellNavRow,#"+shellUiDockId+" .shellActionGrid{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}",
          "#"+shellUiDockId+" .shellActionGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));}",
          "#"+shellUiDockId+" .shellActionGrid>*,#"+shellUiDockId+" .shellNavRow>*{min-width:0;}",
          "@media (max-width:960px){#"+shellUiDockId+" .shellActionGrid{grid-template-columns:repeat(1,minmax(0,1fr));}}"
        ].join("");
        doc.head.appendChild(s);
      }

      const panel = doc.querySelector(".panel");
      if (!panel) return;

      let dock = doc.getElementById(shellUiDockId);
      if (!dock) {
        dock = doc.createElement("section");
        dock.id = shellUiDockId;
        dock.setAttribute("aria-label", "production controls");
        dock.innerHTML = `
          <div class="shellSection">
            <div class="shellSectionLabel">navigation</div>
            <div class="shellNavRow" data-shell-slot="nav"></div>
          </div>
          <div class="shellSection">
            <div class="shellSectionLabel">production</div>
            <div class="shellActionGrid" data-shell-slot="production"></div>
          </div>
        `;
        panel.insertBefore(dock, panel.firstChild);
      }

      const navRow = dock.querySelector('[data-shell-slot="nav"]');
      const actionGrid = dock.querySelector('[data-shell-slot="production"]');
      if (!navRow || !actionGrid) return;

      const moveByIds = (ids, target) => {
        for (const id of ids) {
          const el = doc.getElementById(id);
          if (el && el.parentElement !== target) {
            target.appendChild(el);
          }
        }
      };

      // Group module navigation controls together.
      moveByIds([
        "btnUndo",
        "btnRedo",
        "navPrev",
        "navNext",
        "themePrev",
        "themeNext",
        "starterPrev",
        "starterNext"
      ], navRow);

      const toolbarCandidates = [
        doc.getElementById("previewHistory"),
        doc.querySelector(".previewHistory"),
        doc.getElementById("stageTools"),
        doc.querySelector(".stageTools"),
        doc.getElementById("toolbar"),
        doc.querySelector(".toolbar"),
        doc.getElementById("toolBar"),
        doc.querySelector(".toolBar"),
        doc.getElementById("controls"),
        doc.querySelector(".controls"),
        doc.getElementById("ctrls"),
        doc.querySelector(".ctrls")
      ].filter((el, index, arr) => el && arr.indexOf(el) === index);

      for (const container of toolbarCandidates) {
        const wasPreviewHistory = container.id === "previewHistory" || container.classList.contains("previewHistory");
        const shouldRemove = wasPreviewHistory
          || container.id === "stageThumbs"
          || container.classList.contains("stageTools")
          || container.classList.contains("toolbar")
          || container.classList.contains("toolBar")
          || container.classList.contains("controls")
          || container.classList.contains("ctrls");
        const children = [...container.children];
        if (children.length) {
          for (const child of children) {
            actionGrid.appendChild(child);
          }
          if (shouldRemove) {
            container.remove();
          }
        } else {
          if (shouldRemove) {
            container.remove();
          } else {
            actionGrid.appendChild(container);
          }
        }
      }

      const thumbRail = doc.getElementById("stageThumbs") || doc.querySelector(".stageThumbs");
      thumbRail?.remove();
    } catch (_) {}
  };
  frame.addEventListener("load", revealModulePanel);
  frame.addEventListener("load", () => {
    requestAnimationFrame(rebalanceModuleUi);
  });

  // ── Bridge, Navigation & Search ──────────────────────────────────────────────

  const initBridge = () => {
    const search = document.getElementById("moduleSearch");

    // Try clicking IDs inside the active module iframe in order until one hits.
    const tryIframeClick = (...ids) => {
      let doc = null;
      try {
        doc = frame.contentDocument || frame.contentWindow?.document;
      } catch (_) { return null; }
      if (!doc) return null;
      for (const id of ids) {
        const el = doc.getElementById(id);
        if (el) { el.click(); return id; }
      }
      return null;
    };

    const bridgeAction = (label, ids) => {
      const hit = tryIframeClick(...ids);
      if (!hit) setStatus(`${label}: not supported in ${activeId || "this module"}`);
      return Boolean(hit);
    };

    // Priority fallback lists cover all three template generations:
    // Template A (new/generated): save / save2x / thumb / rec / pause / reset / newSeed /
    //   randomAll / randomForm / randomColor / btnTransparentBg / btnUndo / btnRedo / copyP / pasteP
    // Template B (grid_extrude): btnSave2 / btnSave2x2 / btnThumb2 / btnRec2 / btnNewSeed / btnUndo / btnRedo
    // Template C (hand-authored): btnSave / btnSave2x / btnThumb / btnRec / btnCopy / btnPaste
    //   + noixzyLegacyControlBridge injects: btnReset / btnRandom / btnRandomForm / btnRndColor /
    //     btnNewSeed / btnUndo / btnRedo
    const bridge = {
      save:     () => bridgeAction("Save",            ["save",       "btnSave2",   "btnSave"]),
      save2x:   () => bridgeAction("Save 2×",         ["save2x",     "btnSave2x2", "btnSave2x"]),
      thumb:    () => bridgeAction("Thumbnail",        ["thumb",      "btnThumb2",  "btnThumb"]),
      rec:      () => bridgeAction("Record",           ["rec",        "btnRec2",    "btnRec"]),
      pause:    () => bridgeAction("Pause",            ["pause"]),
      reset:    () => bridgeAction("Reset",            ["reset",      "btnReset"]),
      seed:     () => bridgeAction("New Seed",         ["newSeed",    "btnNewSeed"]),
      rndForm:  () => bridgeAction("Random Form",      ["randomForm", "btnRandomForm"]),
      rndColor: () => bridgeAction("Random Color",     ["randomColor","btnRndColor"]),
      rndAll:   () => bridgeAction("Random All",       ["randomAll",  "randomUnlocked", "btnRandom"]),
      bg:       () => bridgeAction("Transparent BG",   ["btnTransparentBg"]),
      undo:     () => bridgeAction("Undo",             ["btnUndo"]),
      redo:     () => bridgeAction("Redo",             ["btnRedo"]),
      copy:     () => bridgeAction("Copy",             ["copyP",      "btnCopy"]),
      paste:    () => bridgeAction("Paste",            ["pasteP",     "btnPaste"]),
    };

    // Navigate through visible rail buttons by delta (-1 / +1) with wrapping.
    const getVisibleButtons = () =>
      [...document.querySelectorAll(".moduleButton")].filter((b) => !b.hidden);

    const navRail = (delta) => {
      const buttons = getVisibleButtons();
      if (!buttons.length) return;
      const currentIndex = buttons.findIndex((b) => b.dataset.moduleId === activeId);
      const base = currentIndex === -1 ? 0 : currentIndex + delta;
      // Modulo wrap: works for both +1 and -1 without clamping.
      const nextIndex = ((base % buttons.length) + buttons.length) % buttons.length;
      const next = buttons[nextIndex];
      selectModule(next.dataset.moduleId, { updateUrl: true });
      next.scrollIntoView({ block: "nearest", inline: "nearest" });
      next.focus();
    };

    // Wire control strip buttons
    const bindBtn = (id, action) => {
      const el = document.getElementById(id);
      if (el) el.addEventListener("click", action);
    };
    bindBtn("cssPrev",     () => navRail(-1));
    bindBtn("cssNext",     () => navRail(1));
    bindBtn("cssPause",    bridge.pause);
    bindBtn("cssReset",    bridge.reset);
    bindBtn("cssSeed",     bridge.seed);
    bindBtn("cssRndForm",  bridge.rndForm);
    bindBtn("cssRndColor", bridge.rndColor);
    bindBtn("cssRndAll",   bridge.rndAll);
    bindBtn("cssSave",     bridge.save);
    bindBtn("cssSave2x",   bridge.save2x);
    bindBtn("cssThumb",    bridge.thumb);
    bindBtn("cssRec",      bridge.rec);
    bindBtn("cssBg",       bridge.bg);
    bindBtn("cssUndo",     bridge.undo);
    bindBtn("cssRedo",     bridge.redo);
    bindBtn("cssCopy",     bridge.copy);
    bindBtn("cssPaste",    bridge.paste);

    // Search / filter module rail
    const filterModules = (query) => {
      const q = query.toLowerCase().trim();
      document.querySelectorAll(".moduleButton").forEach((btn) => {
        const id = (btn.dataset.moduleId || "").toLowerCase();
        const title = (btn.title || "").toLowerCase();
        btn.hidden = Boolean(q && !id.includes(q) && !title.includes(q));
      });
    };

    if (search) {
      search.addEventListener("input", () => filterModules(search.value));
    }

    // Global keyboard handler — bridge shortcuts + rail navigation + search
    document.addEventListener("keydown", (e) => {
      const tag = document.activeElement?.tagName || "";
      const inInput = ["INPUT", "TEXTAREA", "SELECT"].includes(tag);
      const inSearch = document.activeElement === search;
      const isMod = e.metaKey || e.ctrlKey;

      // Escape: clear search if populated, else close settings
      if (e.key === "Escape") {
        if (inSearch && search && search.value) {
          search.value = "";
          filterModules("");
        } else {
          closeSettingsMenu();
        }
        return;
      }

      // "/" focuses search
      if (e.key === "/" && !inInput) {
        e.preventDefault();
        search?.focus();
        search?.select();
        return;
      }

      // While typing in search only allow Escape and "/" above
      if (inSearch || (inInput && !isMod)) return;

      // Rail navigation
      if (e.key === "ArrowLeft")  { e.preventDefault(); navRail(-1); return; }
      if (e.key === "ArrowRight") { e.preventDefault(); navRail(1);  return; }

      // Bridge keyboard shortcuts
      if (isMod) {
        if (e.key === "z" && !e.shiftKey) { e.preventDefault(); bridge.undo();  return; }
        if (e.key === "z" && e.shiftKey)  { e.preventDefault(); bridge.redo();  return; }
        if (e.key === "s")                { e.preventDefault(); bridge.save();  return; }
        return;
      }

      // Single-key shortcuts (no modifier, not in input)
      switch (e.key) {
        case " ": e.preventDefault(); bridge.pause();   break;
        case "r": bridge.reset();   break;
        case "n": bridge.seed();    break;
        case "f": bridge.rndForm(); break;
        case "a": bridge.rndAll();  break;
        case "b": bridge.bg();      break;
        case "s": bridge.save();    break;
        case "t": bridge.thumb();   break;
      }
    });
  };

  initSettings();
  init();
  initBridge();
})();
</script>
</body>
</html>
